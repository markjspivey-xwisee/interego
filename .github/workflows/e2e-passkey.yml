name: E2E — Passkey OAuth flow

# Runs the Playwright passkey suite against the deployed Azure relay.
# Uses Chrome's virtual authenticator to exercise the full WebAuthn
# register + authorize + token-exchange path without a real device.
#
# The test targets the live Azure deployment by default, so it catches
# regressions that only appear in the real network / TLS / OAuth routing
# path. Runs after the deploy-azure workflow finishes successfully so we
# don't race the relay's revision rollout; can also be run manually.

on:
  workflow_run:
    workflows: ["Deploy to Azure Container Apps"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-passkey-${{ github.ref }}
  cancel-in-progress: true

jobs:
  identity-unit:
    name: Identity unit tests (WebFinger)
    # Skip if the upstream deploy workflow didn't succeed; manual dispatch
    # always runs. Keeps red push notifications off the timeline when the
    # underlying deploy itself failed.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install workspace deps
        run: npm ci --no-audit --no-fund

      - name: Run identity unit tests
        run: npm test --workspace @interego/identity

  playwright:
    name: Passkey OAuth (Playwright, virtual authenticator)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: []
    timeout-minutes: 10

    defaults:
      run:
        working-directory: deploy/mcp-relay

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install + build monorepo workspace
        # Root install resolves workspace symlinks (e.g. @interego/pgsl ->
        # packages/pgsl); the build then produces every workspace package's
        # dist/, including packages/pgsl/dist/index.js. This is required by
        # relay test files (pgsl-shim-kernel-fusion.test.ts and others) that
        # import the built artifacts directly via @interego/pgsl/dist/...
        # Without this, the relay's vitest run dies before Playwright even
        # starts because the import ENOENTs.
        working-directory: .
        run: npm ci --no-audit --no-fund && npm run build

      - name: Install relay deps
        run: npm ci --no-audit --no-fund

      - name: Run relay unit tests (DPoP / federation / OAuth tokens / PGSL shim)
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Azure deployment to settle
        # deploy-azure has already completed successfully (workflow_run
        # trigger), but the new revision can still take a minute to start
        # serving 100% of traffic. Poll /health with a generous deadline.
        if: github.event_name == 'workflow_run'
        run: |
          deadline=$((SECONDS + 420))
          until curl -fsS --max-time 5 "${{ vars.RELAY_PUBLIC_URL || format('https://interego-relay.{0}', vars.AZURE_APPS_DOMAIN_SUFFIX || 'livelysky-8b81abb0.eastus.azurecontainerapps.io') }}/health" > /dev/null; do
            if [ $SECONDS -ge $deadline ]; then
              echo "Relay /health did not become reachable within readiness window" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Run Playwright passkey suite
        env:
          BASE_URL: ${{ vars.RELAY_PUBLIC_URL || format('https://interego-relay.{0}', vars.AZURE_APPS_DOMAIN_SUFFIX || 'livelysky-8b81abb0.eastus.azurecontainerapps.io') }}
          CI: '1'
        run: npx playwright test --reporter=list

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: deploy/mcp-relay/test-results/
          retention-days: 7
