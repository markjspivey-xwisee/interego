name: Deploy to Azure Container Apps

# Triggers on every push to master that changes something a container
# image cares about. Workflow_dispatch lets you also kick it off manually
# from the Actions tab for ad-hoc redeploys.
#
# Five container apps are CI-managed:
#   - interego-dashboard
#   - interego-pgsl-browser
#   - interego-relay
#   - interego-identity
#   - interego-css         (Solid pod server; file-backed storage on mounted volume)

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'deploy/Dockerfile.dashboard'
      - 'deploy/Dockerfile.pgsl-browser'
      - 'deploy/Dockerfile.relay'
      - 'deploy/Dockerfile.identity'
      - 'deploy/Dockerfile.css'
      - 'deploy/mcp-relay/**'
      - 'deploy/identity/**'
      - 'examples/dashboard/**'
      - 'examples/pgsl-browser/**'
      - 'examples/multi-agent/css-config.json'
      - 'docs/ns/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image names (default: all five)'
        required: false
        default: 'dashboard,pgsl-browser,relay,identity,css'

# OIDC federated identity — no long-lived secrets. The id-token: write
# permission is required for actions/federated-credentials to work.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: context-graphs-rg
  AZURE_ACR_NAME: contextgraphsacr

jobs:
  build-and-deploy:
    name: Build & deploy ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      # Don't let one image's failure abort the others. Each container
      # app is independent and we'd rather deploy 3/4 than 0/4.
      fail-fast: false
      matrix:
        include:
          - image: interego-dashboard
            dockerfile: deploy/Dockerfile.dashboard
          - image: interego-pgsl-browser
            dockerfile: deploy/Dockerfile.pgsl-browser
          - image: interego-relay
            dockerfile: deploy/Dockerfile.relay
          - image: interego-identity
            dockerfile: deploy/Dockerfile.identity
          - image: interego-css
            dockerfile: deploy/Dockerfile.css

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # SHA-tag every build so `az containerapp update --image` always
      # creates a fresh revision. The `:latest` tag is pushed too for
      # humans and for the existing ACR Task workflow, but the container
      # app is pinned to the SHA tag for reliable rollback.
      - name: Build image in ACR from current checkout
        run: |
          az acr build \
            --registry "${{ env.AZURE_ACR_NAME }}" \
            --image "${{ matrix.image }}:${{ github.sha }}" \
            --image "${{ matrix.image }}:latest" \
            --file "${{ matrix.dockerfile }}" \
            --no-logs \
            .

      - name: Update container app to new revision
        run: |
          az containerapp update \
            --name "${{ matrix.image }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}" \
            --query "properties.latestRevisionName" \
            --output tsv

      # Dashboard-specific env wiring. The dashboard needs to know:
      #   - IDENTITY_URL   — internal identity host (for /api/identity proxy)
      #   - RELAY_URL      — internal relay host (for OAuth code exchange + /identity-token)
      #   - PUBLIC_RELAY_URL — public relay FQDN (for the browser-side redirect to /authorize)
      #   - PUBLIC_BASE_URL  — public dashboard FQDN (used as OAuth redirect_uri)
      #   - CSS_URL        — already set at provision time; re-asserted for idempotence
      # These are looked up from the existing container apps so we don't
      # hardcode FQDNs; if you rename an app, this step keeps working.
      - name: Wire dashboard env vars
        if: matrix.image == 'interego-dashboard'
        run: |
          IDENTITY_FQDN=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          RELAY_FQDN=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          DASHBOARD_FQDN=$(az containerapp show --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          CSS_FQDN=$(az containerapp show --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          # CSS's ingress-configured FQDN is the reliable route for the
          # dashboard's polling loop (read-only LDP listings + Turtle
          # descriptors). Don't hardcode `.internal`; whatever ingress
          # mode CSS is currently configured for, this pulls the right
          # hostname at deploy time.
          az containerapp update \
            --name interego-dashboard \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars \
              "CSS_URL=https://$CSS_FQDN/" \
              "IDENTITY_URL=https://$IDENTITY_FQDN" \
              "RELAY_URL=https://$RELAY_FQDN" \
              "PUBLIC_RELAY_URL=https://$RELAY_FQDN" \
              "PUBLIC_BASE_URL=https://$DASHBOARD_FQDN" \
            --output none
          # Force traffic to the latest revision. If the container app is
          # in Multiple-revision mode (the default after env-var updates),
          # ingress can otherwise keep serving from the previous revision
          # and new env vars silently don't take effect.
          az containerapp ingress traffic set \
            --name interego-dashboard \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --revision-weight latest=100 \
            --output none
          # Deactivate all but the newest revision so the app is
          # effectively single-revision again (matches our provisioning).
          LATEST=$(az containerapp show --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.latestRevisionName" -o tsv)
          az containerapp revision list --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
            [ -z "$rev" ] && continue
            az containerapp revision deactivate --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --revision "$rev" --output none || true
          done
          echo "Latest active revision: $LATEST"

      - name: Summary
        if: always()
        run: |
          echo "### ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** \`${{ matrix.image }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.AZURE_ACR_NAME }}.azurecr.io\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource group:** \`${{ env.AZURE_RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile:** \`${{ matrix.dockerfile }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "- **Status:** ✅ deployed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ❌ failed" >> $GITHUB_STEP_SUMMARY
          fi
