name: Deploy to Azure Container Apps

# Triggers on every push to master that changes something a container
# image cares about. Workflow_dispatch lets you also kick it off manually
# from the Actions tab for ad-hoc redeploys.
#
# CI-managed container apps:
#   - interego-dashboard
#   - interego-pgsl-browser
#   - interego-relay
#   - interego-identity
#   - interego-css                 (Solid pod server; file-backed storage on mounted volume)
#   - interego-css-gate            (write-gate fronting CSS; only external face of CSS after Fix A)
#   - interego-foxxi-bridge        (Foxxi vertical bridge: MCP/REST surface for content intelligence)
#   - interego-foxxi-dashboard     (Foxxi vertical operator console; Vite SPA via nginx)
#   - interego-foxxi-microsite     (Foxxi try-it-now demo; Vite SPA via nginx)
#   - interego-foxxi-scorm-player  (playable SCORM 2004 sample emitting xAPI to the foxxi bridge)
#   - interego-acme-id             (Acme Training Co demo tenant DID + WebID identity site)
#   - interego-main                (Interego top-level main site; Vite SPA via nginx)
#
# Dockerfile.validator is intentionally NOT in the CI matrix — its own
# comment marks it as "not deployed to the Azure matrix until its rules
# are wired" (Layer 3 reference impl, no live container app yet).

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - 'deploy/Dockerfile.dashboard'
      - 'deploy/Dockerfile.pgsl-browser'
      - 'deploy/Dockerfile.relay'
      - 'deploy/Dockerfile.identity'
      - 'deploy/Dockerfile.css'
      - 'deploy/Dockerfile.css-gate'
      - 'deploy/Dockerfile.foxxi-bridge'
      - 'deploy/Dockerfile.foxxi-dashboard'
      - 'deploy/Dockerfile.foxxi-microsite'
      - 'deploy/Dockerfile.foxxi-scorm-player'
      - 'deploy/Dockerfile.acme-id'
      - 'deploy/Dockerfile.interego-main'
      - 'deploy/mcp-relay/**'
      - 'deploy/identity/**'
      - 'deploy/css-gate/**'
      - 'deploy/foxxi-scorm-player/**'
      - 'deploy/acme-id/**'
      - 'examples/dashboard/**'
      - 'examples/pgsl-browser/**'
      - 'examples/multi-agent/css-config.json'
      - 'applications/_shared/**'
      - 'applications/foxxi-content-intelligence/**'
      - 'applications/learner-performer-companion/src/**'
      - 'applications/lrs-adapter/**'
      - 'applications/agent-collective/**'
      - 'applications/agent-development-practice/**'
      - 'applications/organizational-working-memory/**'
      - 'mcp-server/**'
      - 'deploy/validator/**'
      - 'interego-main/**'
      - 'docs/ns/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image names'
        required: false
        default: 'dashboard,pgsl-browser,relay,identity,css,css-gate,foxxi-bridge,foxxi-dashboard,foxxi-microsite,foxxi-scorm-player,acme-id,interego-main'

# OIDC federated identity — no long-lived secrets. The id-token: write
# permission is required for actions/federated-credentials to work.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: context-graphs-rg
  AZURE_ACR_NAME: contextgraphsacr

jobs:
  # Path-based change detection: decides which images actually need to
  # be rebuilt. Previously every push rebuilt all five — meaning a
  # dashboard-only change still pushed new CSS / identity / relay
  # images, and if any of those images' build or startup regressed we
  # could take down a healthy running container for no reason (which
  # is what happened when CSS went dark mid-session after an unrelated
  # dashboard push). Per-image path filters contain blast radius.
  changes:
    name: Detect changed image inputs
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      pgsl-browser: ${{ steps.filter.outputs.pgsl-browser }}
      relay: ${{ steps.filter.outputs.relay }}
      identity: ${{ steps.filter.outputs.identity }}
      css: ${{ steps.filter.outputs.css }}
      css-gate: ${{ steps.filter.outputs.css-gate }}
      foxxi-bridge: ${{ steps.filter.outputs.foxxi-bridge }}
      foxxi-dashboard: ${{ steps.filter.outputs.foxxi-dashboard }}
      foxxi-microsite: ${{ steps.filter.outputs.foxxi-microsite }}
      foxxi-scorm-player: ${{ steps.filter.outputs.foxxi-scorm-player }}
      acme-id: ${{ steps.filter.outputs.acme-id }}
      interego-main: ${{ steps.filter.outputs.interego-main }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            dashboard:
              - 'examples/dashboard/**'
              - 'packages/**'
              - 'deploy/Dockerfile.dashboard'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - '.github/workflows/deploy-azure.yml'
            pgsl-browser:
              - 'examples/pgsl-browser/**'
              - 'packages/**'
              - 'deploy/Dockerfile.pgsl-browser'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - '.github/workflows/deploy-azure.yml'
            relay:
              - 'deploy/mcp-relay/**'
              - 'packages/**'
              - 'deploy/Dockerfile.relay'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - '.github/workflows/deploy-azure.yml'
            identity:
              - 'deploy/identity/**'
              - 'deploy/Dockerfile.identity'
              - '.github/workflows/deploy-azure.yml'
            css:
              - 'deploy/Dockerfile.css'
              - 'examples/multi-agent/css-config.json'
              - '.github/workflows/deploy-azure.yml'
            css-gate:
              - 'deploy/Dockerfile.css-gate'
              - 'deploy/css-gate/**'
              - '.github/workflows/deploy-azure.yml'
            foxxi-bridge:
              - 'deploy/Dockerfile.foxxi-bridge'
              - 'applications/_shared/**'
              - 'applications/foxxi-content-intelligence/**'
              - 'applications/learner-performer-companion/src/**'
              - 'applications/lrs-adapter/src/**'
              - 'applications/agent-collective/bridge/package.json'
              - 'applications/agent-development-practice/bridge/package.json'
              - 'applications/organizational-working-memory/bridge/package.json'
              - 'applications/lrs-adapter/bridge/package.json'
              - 'mcp-server/package.json'
              - 'deploy/validator/package.json'
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'docs/ns/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/deploy-azure.yml'
            foxxi-dashboard:
              - 'deploy/Dockerfile.foxxi-dashboard'
              - 'applications/foxxi-content-intelligence/dashboard-app/**'
              - 'applications/foxxi-content-intelligence/src/**'
              - 'applications/foxxi-content-intelligence/imported/**'
              - 'applications/foxxi-content-intelligence/package.json'
              - '.github/workflows/deploy-azure.yml'
            foxxi-microsite:
              - 'deploy/Dockerfile.foxxi-microsite'
              - 'applications/foxxi-content-intelligence/microsite-app/**'
              - 'applications/foxxi-content-intelligence/src/**'
              - 'applications/foxxi-content-intelligence/package.json'
              - '.github/workflows/deploy-azure.yml'
            foxxi-scorm-player:
              - 'deploy/Dockerfile.foxxi-scorm-player'
              - 'deploy/foxxi-scorm-player/**'
              - '.github/workflows/deploy-azure.yml'
            acme-id:
              - 'deploy/Dockerfile.acme-id'
              - 'deploy/acme-id/**'
              - '.github/workflows/deploy-azure.yml'
            interego-main:
              - 'deploy/Dockerfile.interego-main'
              - 'interego-main/**'
              - '.github/workflows/deploy-azure.yml'

  build-and-deploy:
    name: Build & deploy ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: changes

    strategy:
      # Don't let one image's failure abort the others. Each container
      # app is independent and we'd rather deploy 3/4 than 0/4.
      fail-fast: false
      matrix:
        include:
          - image: interego-dashboard
            dockerfile: deploy/Dockerfile.dashboard
            filter: dashboard
          - image: interego-pgsl-browser
            dockerfile: deploy/Dockerfile.pgsl-browser
            filter: pgsl-browser
          - image: interego-relay
            dockerfile: deploy/Dockerfile.relay
            filter: relay
          - image: interego-identity
            dockerfile: deploy/Dockerfile.identity
            filter: identity
          - image: interego-css
            dockerfile: deploy/Dockerfile.css
            filter: css
          - image: interego-css-gate
            dockerfile: deploy/Dockerfile.css-gate
            filter: css-gate
            node_base: public.ecr.aws/docker/library/node:20-alpine
          - image: interego-foxxi-bridge
            dockerfile: deploy/Dockerfile.foxxi-bridge
            filter: foxxi-bridge
          - image: interego-foxxi-dashboard
            dockerfile: deploy/Dockerfile.foxxi-dashboard
            filter: foxxi-dashboard
          - image: interego-foxxi-microsite
            dockerfile: deploy/Dockerfile.foxxi-microsite
            filter: foxxi-microsite
          - image: interego-foxxi-scorm-player
            dockerfile: deploy/Dockerfile.foxxi-scorm-player
            filter: foxxi-scorm-player
          - image: interego-acme-id
            dockerfile: deploy/Dockerfile.acme-id
            filter: acme-id
          - image: interego-main
            dockerfile: deploy/Dockerfile.interego-main
            filter: interego-main

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Determine whether THIS matrix entry should rebuild.
      #
      #  - push events: honor the per-image path filters from the
      #    `changes` job. If none of this image's inputs changed, skip.
      #  - workflow_dispatch: honor the `images` input. Default is
      #    "dashboard,pgsl-browser,relay,identity,css" so manual runs
      #    still rebuild everything unless narrowed.
      - name: Decide whether to (re)build
        id: decide
        run: |
          IMG="${{ matrix.filter }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SEL="${{ github.event.inputs.images }}"
            if echo ",$SEL," | grep -q ",$IMG,"; then
              echo "build=true" >> "$GITHUB_OUTPUT"
            else
              echo "build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            case "$IMG" in
              dashboard)          CHG='${{ needs.changes.outputs.dashboard }}' ;;
              pgsl-browser)       CHG='${{ needs.changes.outputs.pgsl-browser }}' ;;
              relay)              CHG='${{ needs.changes.outputs.relay }}' ;;
              identity)           CHG='${{ needs.changes.outputs.identity }}' ;;
              css)                CHG='${{ needs.changes.outputs.css }}' ;;
              css-gate)           CHG='${{ needs.changes.outputs.css-gate }}' ;;
              foxxi-bridge)       CHG='${{ needs.changes.outputs.foxxi-bridge }}' ;;
              foxxi-dashboard)    CHG='${{ needs.changes.outputs.foxxi-dashboard }}' ;;
              foxxi-microsite)    CHG='${{ needs.changes.outputs.foxxi-microsite }}' ;;
              foxxi-scorm-player) CHG='${{ needs.changes.outputs.foxxi-scorm-player }}' ;;
              acme-id)            CHG='${{ needs.changes.outputs.acme-id }}' ;;
              interego-main)      CHG='${{ needs.changes.outputs.interego-main }}' ;;
            esac
            echo "build=$CHG" >> "$GITHUB_OUTPUT"
          fi
          echo "Image ${{ matrix.image }}: build=$(cat $GITHUB_OUTPUT | grep ^build= | cut -d= -f2)"

      - name: Azure login (OIDC)
        if: steps.decide.outputs.build == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # SHA-tag every build so `az containerapp update --image` always
      # creates a fresh revision. The `:latest` tag is pushed too for
      # humans and for the existing ACR Task workflow, but the container
      # app is pinned to the SHA tag for reliable rollback.
      - name: Build image in ACR from current checkout
        if: steps.decide.outputs.build == 'true'
        run: |
          # NOTE: do not re-add `--no-logs`. It suppresses the ACR build
          # output, which makes a failing build undiagnosable from the
          # Actions log (you only get a generic "RunStatus.FAILED"). The
          # full build log is worth the extra output.
          #
          # Base image: pulled from AWS ECR Public's mirror of the Docker
          # official images (`public.ecr.aws/docker/library/node:20-slim`)
          # — NOT Docker Hub. Docker Hub rate-limits anonymous pulls per
          # egress IP, and ACR build agents share egress IPs; that was the
          # root cause of the intermittent `FROM node:20-slim →
          # toomanyrequests` failures. `az acr import` did not escape it
          # (ACR's import pulls anonymously from Docker Hub too). ECR
          # Public is a different registry with far more generous
          # anonymous limits, so the pull just works. The Dockerfiles
          # default `ARG NODE_BASE=node:20-slim`, so a local `docker
          # build` (no --build-arg) still uses Docker Hub normally.
          #
          # The retry loop is defense-in-depth — it covers the gcr.io
          # distroless runtime-stage pull and any ACR transient. Each
          # `az acr build` gets a fresh agent. `set -e` does not abort on
          # a failure inside an `if` condition, so the loop is safe under
          # the shell's default `-e`.
          for attempt in 1 2 3; do
            if az acr build \
                 --registry "${{ env.AZURE_ACR_NAME }}" \
                 --image "${{ matrix.image }}:${{ github.sha }}" \
                 --image "${{ matrix.image }}:latest" \
                 --file "${{ matrix.dockerfile }}" \
                 --build-arg "NODE_BASE=${{ matrix.node_base || 'public.ecr.aws/docker/library/node:20-slim' }}" \
                 .; then
              echo "ACR build succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::ACR build attempt $attempt failed; retrying in 120s..."
            sleep 120
          done
          echo "::error::ACR build failed after 3 attempts"
          exit 1

      - name: Update container app to new revision
        if: steps.decide.outputs.build == 'true'
        run: |
          az containerapp update \
            --name "${{ matrix.image }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}" \
            --query "properties.latestRevisionName" \
            --output tsv

      # Dashboard-specific env wiring. The dashboard needs to know:
      #   - IDENTITY_URL   — internal identity host (for /api/identity proxy)
      #   - RELAY_URL      — internal relay host (for OAuth code exchange + /identity-token)
      #   - PUBLIC_RELAY_URL — public relay FQDN (for the browser-side redirect to /authorize)
      #   - PUBLIC_BASE_URL  — public dashboard FQDN (used as OAuth redirect_uri)
      #   - CSS_URL        — already set at provision time; re-asserted for idempotence
      # These are looked up from the existing container apps so we don't
      # hardcode FQDNs; if you rename an app, this step keeps working.
      - name: Wire dashboard env vars
        if: steps.decide.outputs.build == 'true' && matrix.image == 'interego-dashboard'
        run: |
          IDENTITY_FQDN=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          RELAY_FQDN=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          DASHBOARD_FQDN=$(az containerapp show --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          # CSS is internal-only (Fix A — anon-write hole closed). The
          # dashboard is a BROWSER-facing app: the browser cannot resolve
          # `*.internal.*.azurecontainerapps.io`, so we must point its
          # CSS_URL at the public css-gate FQDN, NOT the CSS internal
          # FQDN. The gate enforces per-user write authz and passes
          # reads through anonymously.
          CSS_GATE_FQDN=$(az containerapp show --name interego-css-gate --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          az containerapp update \
            --name interego-dashboard \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars \
              "CSS_URL=https://$CSS_GATE_FQDN/" \
              "IDENTITY_URL=https://$IDENTITY_FQDN" \
              "RELAY_URL=https://$RELAY_FQDN" \
              "PUBLIC_RELAY_URL=https://$RELAY_FQDN" \
              "PUBLIC_BASE_URL=https://$DASHBOARD_FQDN" \
            --output none
          # In Multiple-revision mode, an env-var update creates a new
          # revision but ingress keeps serving from the previous one —
          # explicit traffic-set + deactivate-older is required. In
          # Single-revision mode, Azure auto-activates the new revision
          # and the traffic-set API refuses with an error, so we must
          # branch on the currently-configured mode before calling it.
          MODE=$(az containerapp show --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.activeRevisionsMode" -o tsv)
          echo "activeRevisionsMode=$MODE"
          if [ "$MODE" = "Multiple" ]; then
            az containerapp ingress traffic set \
              --name interego-dashboard \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision-weight latest=100 \
              --output none
            LATEST=$(az containerapp show --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.latestRevisionName" -o tsv)
            az containerapp revision list --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              az containerapp revision deactivate --name interego-dashboard --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --revision "$rev" --output none || true
            done
            echo "Latest active revision: $LATEST"
          fi

      # Identity-specific env wiring. The identity server needs to know:
      #   - BASE_URL              — its own public FQDN (WebID profiles,
      #                             DID docs, the static WebAuthn RP fallback)
      #   - WEBAUTHN_RP_ORIGINS   — the allowlist of origins where a
      #                             WebAuthn ceremony may legitimately run:
      #                             BOTH the identity FQDN (the /connect
      #                             enrollment page) AND the relay FQDN
      #                             (the relay's OAuth /authorize page POSTs
      #                             its ceremonies here). Without the identity
      #                             FQDN on this list, /connect passkey
      #                             enrollment fails with an rpID-mismatch.
      #   - RELAY_URL             — surfaced on the landing page so agent
      #                             operators can copy it.
      # FQDNs are looked up from the live container apps so renaming an
      # app keeps this working — same pattern as the dashboard step.
      - name: Wire identity env vars
        if: steps.decide.outputs.build == 'true' && matrix.image == 'interego-identity'
        run: |
          IDENTITY_FQDN=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          RELAY_FQDN=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          # TOKEN_SIGNING_KEY: HMAC secret used to sign stateless bearer
          # tokens. Without it the identity server falls back to an
          # ephemeral random key — which means every deploy / pod restart
          # invalidates every user's session. Idempotent: we only set it
          # if it isn't already configured, so subsequent deploys reuse
          # the original key and existing sessions survive.
          # Prefer the Container Apps secret store; fall back to a legacy
          # plaintext env var on older revisions so the value can be migrated
          # into the secret store on this deploy.
          EXISTING_TOKEN_KEY=$(az containerapp secret show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --secret-name token-signing-key --query value -o tsv 2>/dev/null || true)
          if [ -z "$EXISTING_TOKEN_KEY" ]; then
            EXISTING_TOKEN_KEY=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.template.containers[0].env[?name=='TOKEN_SIGNING_KEY'].value | [0]" -o tsv)
          fi
          # IDENTITY_TIMING: when set to "1" the /auth/did handler emits 6
          # structured `[identity-timing] step=… ms=…` lines per request
          # (did-parse / did-verify / did-index-lookup / did-pod-write /
          # did-issue-token / did-total). Pinned to "1" in IaC because the
          # signal is cheap (single guarded console.log per step, no string
          # work on the disabled path) and we want every redeploy to keep
          # cold-path visibility — previously this was set manually via
          # `az containerapp update --set-env-vars` and got blown away on
          # the next CI deploy (same trap as the old CSS_URL pattern).
          if [ -z "$EXISTING_TOKEN_KEY" ]; then
            echo "TOKEN_SIGNING_KEY not yet configured — generating fresh 32-byte HMAC key."
            NEW_TOKEN_KEY=$(openssl rand -base64 32)
            az containerapp secret set \
              --name interego-identity \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --secrets "token-signing-key=$NEW_TOKEN_KEY" \
              --output none
            az containerapp update \
              --name interego-identity \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars \
                "BASE_URL=https://$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ID=$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ORIGIN=https://$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ORIGINS=https://$IDENTITY_FQDN,https://$RELAY_FQDN" \
                "RELAY_URL=https://$RELAY_FQDN" \
                "TOKEN_SIGNING_KEY=secretref:token-signing-key" \
                "IDENTITY_TIMING=1" \
              --output none
          else
            echo "TOKEN_SIGNING_KEY already configured (length: ${#EXISTING_TOKEN_KEY}) — preserving so sessions survive this deploy."
            # Ensure the key is stored as a secret + bound by secretref even
            # if the prior deploy stored it as a plaintext env var.
            az containerapp secret set \
              --name interego-identity \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --secrets "token-signing-key=$EXISTING_TOKEN_KEY" \
              --output none
            az containerapp update \
              --name interego-identity \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars \
                "BASE_URL=https://$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ID=$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ORIGIN=https://$IDENTITY_FQDN" \
                "WEBAUTHN_RP_ORIGINS=https://$IDENTITY_FQDN,https://$RELAY_FQDN" \
                "RELAY_URL=https://$RELAY_FQDN" \
                "TOKEN_SIGNING_KEY=secretref:token-signing-key" \
                "IDENTITY_TIMING=1" \
              --output none
          fi
          # Same Multiple-vs-Single revision-mode handling as the dashboard
          # step: in Multiple mode an env-var update creates a new revision
          # that ingress won't serve until traffic is explicitly shifted.
          MODE=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.activeRevisionsMode" -o tsv)
          echo "activeRevisionsMode=$MODE"
          if [ "$MODE" = "Multiple" ]; then
            az containerapp ingress traffic set \
              --name interego-identity \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision-weight latest=100 \
              --output none
            LATEST=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.latestRevisionName" -o tsv)
            az containerapp revision list --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              az containerapp revision deactivate --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --revision "$rev" --output none || true
            done
            echo "Latest active revision: $LATEST"
          fi

      # Relay-specific env wiring. The relay needs to know:
      #   - CSS_URL                 — already set at provision time; re-asserted for idempotence
      #   - RELAY_OAUTH_STORE_POD   — the service-account pod URL where the
      #                               relay persists its OAuth Dynamic Client
      #                               Registration records. MUST NOT be any
      #                               human user's pod. CSS auto-creates the
      #                               container on first PUT, so this pod
      #                               does not need to exist before the relay
      #                               starts writing to it.
      # FQDNs are looked up from the live container apps so renaming an
      # app keeps this working — same pattern as the dashboard / identity steps.
      - name: Wire relay env vars
        if: steps.decide.outputs.build == 'true' && matrix.image == 'interego-relay'
        run: |
          # CSS is internal-only (Fix A). The relay is a SERVER-SIDE
          # caller running inside the same Container Apps environment,
          # so it can — and should — reach CSS at the internal FQDN.
          # Going through the gate from in-cluster would add a hop and
          # the gate's bearer auth without benefit. The CSS ingress
          # FQDN is now of the form `<app>.internal.<envDomain>`; that
          # value flows through unchanged.
          CSS_FQDN=$(az containerapp show --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          IDENTITY_FQDN=$(az containerapp show --name interego-identity --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          RELAY_FQDN=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          az containerapp update \
            --name interego-relay \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars \
              "CSS_URL=https://$CSS_FQDN/" \
              "RELAY_OAUTH_STORE_POD=https://$CSS_FQDN/svc-relay-dcr/" \
              "IDENTITY_URL=https://$IDENTITY_FQDN" \
              "PUBLIC_BASE_URL=https://$RELAY_FQDN" \
            --output none
          # Same Multiple-vs-Single revision-mode handling as the dashboard
          # / identity steps: in Multiple mode an env-var update creates a
          # new revision that ingress won't serve until traffic is
          # explicitly shifted.
          MODE=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.activeRevisionsMode" -o tsv)
          echo "activeRevisionsMode=$MODE"
          if [ "$MODE" = "Multiple" ]; then
            az containerapp ingress traffic set \
              --name interego-relay \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision-weight latest=100 \
              --output none
            LATEST=$(az containerapp show --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.latestRevisionName" -o tsv)
            az containerapp revision list --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              az containerapp revision deactivate --name interego-relay --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --revision "$rev" --output none || true
            done
            echo "Latest active revision: $LATEST"
          fi

      # CSS-specific env wiring. CSS needs to know:
      #   - CSS_BASE_URL — the hostname CSS treats as "in-space" when
      #                    minting WebIDs / container URLs AND when
      #                    validating incoming request Host headers
      #                    ("outside the configured identifier space"
      #                    is rejected).
      #
      # We deliberately pin CSS_BASE_URL to the INTERNAL CSS FQDN here.
      # Background: pointing it at the public css-gate FQDN looked
      # appealing (externally-dereferenceable WebIDs) but it ties every
      # server-side write through the gate's reverse-proxy code path,
      # which uses raw https.request with a public-Host-header override
      # and is currently flaky under ALPN/keep-alive (ECONNRESET storms
      # break relay /oauth/verify, identity manifest writes, federation-
      # store writes). The CSS image is configured with the
      # suffix.json identifier strategy and a single --baseUrl arg — no
      # multi-base knob exists without a custom Components.js
      # IdentifierStrategy + image rebuild.
      #
      # The anon-write hole stays closed regardless: CSS still runs
      # `--ingress internal`, so there is no public CSS endpoint for
      # anonymous traffic to reach. Once the gate proxy is replaced
      # with undici.Dispatcher (ALPN h2 + Host-header override on a
      # pooled connection), flip this back to the gate FQDN and
      # re-issue WebIDs minted during the internal window.
      - name: Wire css env vars
        if: steps.decide.outputs.build == 'true' && matrix.image == 'interego-css'
        run: |
          CSS_FQDN=$(az containerapp show --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          az containerapp update \
            --name interego-css \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars \
              "CSS_BASE_URL=https://$CSS_FQDN/" \
            --output none
          MODE=$(az containerapp show --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.configuration.activeRevisionsMode" -o tsv)
          echo "activeRevisionsMode=$MODE"
          if [ "$MODE" = "Multiple" ]; then
            az containerapp ingress traffic set \
              --name interego-css \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision-weight latest=100 \
              --output none
            LATEST=$(az containerapp show --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "properties.latestRevisionName" -o tsv)
            az containerapp revision list --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              az containerapp revision deactivate --name interego-css --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --revision "$rev" --output none || true
            done
            echo "Latest active revision: $LATEST"
          fi

      # Foxxi bridge env wiring. The live `interego-foxxi-bridge` revision
      # carries 19 vertical-specific env vars (tenant pod URL, audience,
      # admin WebID, federation pod list, LRS basic-auth pairs, LLM API
      # key, key seeds, bridge private key, write secret, ...). None of
      # them are baked into the image, none ship from GitHub Actions
      # secrets, and the create call in `deploy/azure-deploy.sh §10` only
      # sets CSS_URL/IDENTITY_URL/RELAY_URL. On any CI redeploy that
      # rotates the image, the new revision would boot with those 19 vars
      # missing and the bridge would half-configure — same trap the
      # CSS_URL pattern hit before identity-wiring was added.
      #
      # Source of truth = the live revision. We read each var off the
      # currently-active revision and re-assert it on the new one,
      # promoting the five sensitive values (FOXXI_LLM_API_KEY,
      # FOXXI_ADMIN_KEY_SEED, FOXXI_ISSUER_KEY_SEED,
      # FOXXI_BRIDGE_PRIVATE_KEY, FOXXI_POD_WRITE_SECRET) to Container
      # Apps secrets so they no longer surface in revision specs / ARM
      # activity logs. Vars that are unset on the live revision are
      # skipped — the deployer is responsible for seeding them once via
      # `az containerapp update` before the first CI redeploy.
      - name: Wire foxxi-bridge env vars
        if: steps.decide.outputs.build == 'true' && matrix.image == 'interego-foxxi-bridge'
        run: |
          APP=interego-foxxi-bridge
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          read_env() {
            az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.template.containers[0].env[?name=='$1'].value | [0]" -o tsv 2>/dev/null || true
          }
          read_secretref() {
            az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.template.containers[0].env[?name=='$1'].secretRef | [0]" -o tsv 2>/dev/null || true
          }
          read_secret_value() {
            az containerapp secret show --name "$APP" --resource-group "$RG" \
              --secret-name "$1" --query value -o tsv 2>/dev/null || true
          }
          PLAIN_VARS=(FOXXI_TENANT_POD_URL FOXXI_AUTHORITATIVE_SOURCE FOXXI_AUDIENCE FOXXI_DASHBOARD_ORIGIN BRIDGE_DEPLOYMENT_URL FOXXI_ADMIN_WEB_ID FOXXI_REQUIRE_AUTH FOXXI_TENANT_PROFILE_NAME FOXXI_LEARNING_ENGINEER_WEB_IDS FOXXI_LRS_BASIC_AUTH_PAIRS FOXXI_FEDERATION_PODS FOXXI_AGENTIC_RATE_LIMIT_PER_IP FOXXI_LRS_BACKEND)
          SECRET_VARS=(FOXXI_LLM_API_KEY FOXXI_ADMIN_KEY_SEED FOXXI_ISSUER_KEY_SEED FOXXI_BRIDGE_PRIVATE_KEY FOXXI_POD_WRITE_SECRET)
          declare -a SET_ARGS
          for v in "${PLAIN_VARS[@]}"; do
            val=$(read_env "$v")
            if [ -n "$val" ]; then
              SET_ARGS+=("$v=$val")
              echo "  preserve $v (plain)"
            else
              echo "::warning::$v unset on live $APP revision — skipping; seed it once before the next redeploy"
            fi
          done
          for v in "${SECRET_VARS[@]}"; do
            sname=$(echo "$v" | tr 'A-Z_' 'a-z-')
            existing_ref=$(read_secretref "$v")
            if [ -n "$existing_ref" ]; then
              SET_ARGS+=("$v=secretref:$existing_ref")
              echo "  preserve $v (secretref:$existing_ref)"
              continue
            fi
            val=$(read_env "$v")
            if [ -n "$val" ]; then
              az containerapp secret set --name "$APP" --resource-group "$RG" \
                --secrets "$sname=$val" --output none
              SET_ARGS+=("$v=secretref:$sname")
              echo "  promote $v plain->secretref:$sname"
              continue
            fi
            existing_secret=$(read_secret_value "$sname")
            if [ -n "$existing_secret" ]; then
              SET_ARGS+=("$v=secretref:$sname")
              echo "  bind $v->secretref:$sname (secret already configured)"
            else
              echo "::warning::$v unset on live $APP revision — skipping; seed it once before the next redeploy"
            fi
          done
          if [ "${#SET_ARGS[@]}" -gt 0 ]; then
            az containerapp update --name "$APP" --resource-group "$RG" \
              --set-env-vars "${SET_ARGS[@]}" --output none
          else
            echo "No foxxi-bridge env vars present on live revision - nothing to wire."
          fi
          # Same Multiple-vs-Single revision-mode handling as the other
          # wiring steps: in Multiple mode an env-var update creates a
          # new revision that ingress won't serve until traffic is
          # explicitly shifted.
          MODE=$(az containerapp show --name "$APP" --resource-group "$RG" --query "properties.configuration.activeRevisionsMode" -o tsv)
          echo "activeRevisionsMode=$MODE"
          if [ "$MODE" = "Multiple" ]; then
            az containerapp ingress traffic set --name "$APP" --resource-group "$RG" --revision-weight latest=100 --output none
            LATEST=$(az containerapp show --name "$APP" --resource-group "$RG" --query "properties.latestRevisionName" -o tsv)
            az containerapp revision list --name "$APP" --resource-group "$RG" --query "[?name!='$LATEST' && properties.active].name" -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              az containerapp revision deactivate --name "$APP" --resource-group "$RG" --revision "$rev" --output none || true
            done
            echo "Latest active revision: $LATEST"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.decide.outputs.build }}" != "true" ]; then
            echo "- **Status:** ⏭ skipped (no input path changed)" >> $GITHUB_STEP_SUMMARY
            echo "- **Dockerfile:** \`${{ matrix.dockerfile }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Image tag:** \`${{ matrix.image }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Registry:** \`${{ env.AZURE_ACR_NAME }}.azurecr.io\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Resource group:** \`${{ env.AZURE_RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Dockerfile:** \`${{ matrix.dockerfile }}\`" >> $GITHUB_STEP_SUMMARY
            if [ "${{ job.status }}" = "success" ]; then
              echo "- **Status:** ✅ deployed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Status:** ❌ failed" >> $GITHUB_STEP_SUMMARY
            fi
          fi
