<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGSL Browser — Poly-Granular Sequence Lattice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #f5f5f0; color: #333; overflow: hidden; }

  .header { padding: 8px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 12px; z-index: 10; position: relative; }
  .header h1 { font-size: 14px; color: #333; font-weight: 600; }
  .header .stats { font-size: 11px; color: #888; }

  .layout { display: flex; height: calc(100vh - 40px); }

  /* Controls panel */
  .controls { width: 240px; background: #fff; border-right: 1px solid #ddd; padding: 12px; overflow-y: auto; flex-shrink: 0; }
  .controls h2 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .controls textarea { width: 100%; height: 50px; border: 1px solid #ccc; padding: 6px; font-family: inherit; font-size: 11px; border-radius: 3px; resize: vertical; }
  .controls select { border: 1px solid #ccc; padding: 2px 6px; font-size: 10px; border-radius: 3px; }
  .controls button { background: #4a8a4a; color: #fff; border: none; padding: 3px 10px; font-size: 10px; border-radius: 3px; cursor: pointer; }
  .controls button:hover { background: #5a9a5a; }
  .ctrl-row { display: flex; gap: 4px; margin-top: 4px; margin-bottom: 12px; }

  .node-list { list-style: none; margin-top: 8px; }
  .node-list li { padding: 3px 6px; font-size: 10px; cursor: pointer; border-radius: 2px; margin-bottom: 1px; display: flex; justify-content: space-between; align-items: center; }
  .node-list li:hover { background: #e8e8ff; }
  .node-list li.active { background: #d0d0ff; }
  .node-list .lbl { font-size: 9px; color: #999; padding: 1px 4px; background: #f0f0f0; border-radius: 8px; }

  /* Graph canvas */
  .graph-area { flex: 1; position: relative; overflow: auto; }
  .graph-container { position: relative; min-width: 100%; min-height: 100%; }

  /* Graph nodes */
  .gnode { position: absolute; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; border: 2px solid transparent; transition: all 0.15s; z-index: 2; }
  .gnode:hover { transform: scale(1.1); z-index: 5; }
  .gnode.atom { background: #ffe0e0; border-color: #e88; }
  .gnode.l1 { background: #fff0d0; border-color: #da5; }
  .gnode.fragment { background: #e0e8ff; border-color: #88e; }
  .gnode.nested { background: #333; color: #fff; border-color: #666; }
  .gnode.focused { border-color: #f00; border-width: 3px; box-shadow: 0 0 8px rgba(255,0,0,0.3); }

  /* Edges (SVG overlay) */
  .edges-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  .edge { stroke: #ccc; stroke-width: 1; fill: none; }
  .edge.left-const { stroke: #aaf; stroke-width: 1.5; }
  .edge.right-const { stroke: #faa; stroke-width: 1.5; }

  /* Chain view */
  .chain-panel { position: fixed; bottom: 0; left: 240px; right: 0; background: #fff; border-top: 2px solid #ddd; padding: 12px 20px; z-index: 10; }
  .chain-display { display: flex; align-items: center; gap: 0; flex-wrap: wrap; justify-content: center; font-size: 14px; }
  .chain-display .plus { color: #999; padding: 0 4px; cursor: pointer; font-weight: bold; }
  .chain-display .plus:hover { color: #4a8a4a; }
  .chain-display .item { padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .chain-display .item.atom { background: #ffe0e0; border: 1px solid #e88; }
  .chain-display .item.frag { background: #e0e8ff; border: 1px solid #88e; }
  .chain-display .item.nested-item { background: #333; color: #fff; border: 1px solid #666; }
  .chain-display .sep { color: #ccc; padding: 0 2px; }
  .chain-display .paren { color: #888; font-size: 16px; font-weight: bold; }
  .chain-info { text-align: center; margin-top: 6px; font-size: 10px; color: #888; }

  /* Source/target option stacks */
  .options-stack { display: inline-flex; flex-direction: column; gap: 2px; vertical-align: middle; max-height: 100px; overflow-y: auto; }
  .option-item { display: block; padding: 2px 8px; font-size: 10px; cursor: pointer; border-radius: 3px; white-space: nowrap; }
  .option-item.source { color: #4a8a4a; background: #f0f8f0; border: 1px solid #cde0cd; }
  .option-item.source:hover { background: #d0e8d0; }
  .option-item.target { color: #8a4a8a; background: #f8f0f8; border: 1px solid #e0cde0; }
  .option-item.target:hover { background: #e8d0e8; }

  /* Add input */
  .add-popup { position: fixed; background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 20; }
  .add-popup input { border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; font-family: inherit; width: 120px; outline: none; }
  .add-popup .dropdown { max-height: 120px; overflow-y: auto; }
  .add-popup .dropdown-item { padding: 3px 8px; font-size: 11px; cursor: pointer; }
  .add-popup .dropdown-item:hover { background: #e8e8ff; }
</style>
</head>
<body>

<div class="header">
  <h1>PGSL Browser</h1>
  <div class="stats" id="stats">Loading...</div>
</div>

<div class="layout">
  <div class="controls">
    <h2>Ingest</h2>
    <textarea id="ingestInput" placeholder="mark is human"></textarea>
    <div class="ctrl-row">
      <select id="granularity">
        <option value="word">word</option>
        <option value="character">char</option>
        <option value="sentence">sent</option>
        <option value="structured">struct</option>
      </select>
      <button onclick="doIngest()">Ingest</button>
    </div>

    <h2>Nodes</h2>
    <ul class="node-list" id="nodeList"></ul>
  </div>

  <div class="graph-area" id="graphArea">
    <svg class="edges-svg" id="edgesSvg"></svg>
    <div class="graph-container" id="graphContainer"></div>
  </div>
</div>

<div class="chain-panel" id="chainPanel">
  <div class="chain-display" id="chainDisplay">
    <span style="color:#999">Click a node in the graph to focus</span>
  </div>
  <div class="chain-info" id="chainInfo"></div>
</div>

<script>
let allNodes = [];
let focusChain = [];
let focusData = null;
let chainData = null; // from /api/chain — inner/outer neighbors
let nodePositions = {}; // uri -> {x, y}

// ── URL-based navigation ──
function updateUrl() {
  if (focusChain.length === 1) {
    history.pushState(null, '', '/node/' + encodeURIComponent(focusChain[0]));
  } else if (focusChain.length > 1) {
    history.pushState(null, '', '/node/' + encodeURIComponent(focusChain[0]) + '?chain=' + focusChain.map(encodeURIComponent).join(','));
  }
}

function loadFromUrl() {
  const path = window.location.pathname;
  if (path.startsWith('/node/')) {
    const uri = decodeURIComponent(path.slice(6));
    const params = new URLSearchParams(window.location.search);
    const chain = params.get('chain');
    if (chain) {
      focusChain = chain.split(',').map(decodeURIComponent);
    } else {
      focusChain = [uri];
    }
    // Defer click until allNodes is loaded
    setTimeout(() => { if (focusChain.length > 0) clickNode(encodeURIComponent(focusChain[0])); }, 500);
  }
}

window.addEventListener('popstate', loadFromUrl);

async function doIngest() {
  const content = document.getElementById('ingestInput').value.trim();
  if (!content) return;
  const granularity = document.getElementById('granularity').value;
  await fetch('/api/ingest', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content, granularity }),
  });
  document.getElementById('ingestInput').value = '';
  await refreshAll();
}

async function refreshAll() {
  const resp = await fetch('/api/all');
  const data = await resp.json();
  allNodes = data.nodes;
  document.getElementById('stats').textContent =
    data.stats.totalNodes + ' nodes | ' + data.stats.atoms + ' atoms | ' + data.stats.fragments + ' frags | L0-L' + data.stats.maxLevel;
  renderNodeList();
  renderGraph();
}

function renderNodeList() {
  const list = document.getElementById('nodeList');
  const sorted = [...allNodes].sort((a, b) => a.level - b.level || a.resolved.localeCompare(b.resolved));
  list.innerHTML = sorted.map(n => {
    const active = focusChain.includes(n.uri) ? ' active' : '';
    const display = n.resolved.length > 20 ? n.resolved.slice(0, 18) + '..' : n.resolved;
    return '<li class="' + active + '" onclick="clickNode(\'' + encodeURIComponent(n.uri) + '\')">' +
      '<span>' + display + '</span><span class="lbl">L' + n.level + '</span></li>';
  }).join('');
}

function renderGraph() {
  const container = document.getElementById('graphContainer');
  const svg = document.getElementById('edgesSvg');
  container.innerHTML = '';
  svg.innerHTML = '';
  nodePositions = {};

  if (allNodes.length === 0) return;

  // Group by level
  const levels = {};
  let maxLevel = 0;
  for (const n of allNodes) {
    if (!levels[n.level]) levels[n.level] = [];
    levels[n.level].push(n);
    if (n.level > maxLevel) maxLevel = n.level;
  }

  // Position nodes: level = y (bottom to top), index = x
  const nodeW = 60, nodeH = 30, gapX = 20, gapY = 50;
  const graphH = (maxLevel + 1) * (nodeH + gapY) + 80;
  container.style.minHeight = graphH + 'px';

  const levelColors = ['#ffe0e0', '#fff0d0', '#e0f0e0', '#e0e8ff', '#e8e0ff', '#f0e0ff', '#ffe0f0', '#e0ffff'];

  for (let level = 0; level <= maxLevel; level++) {
    const nodes = levels[level] || [];
    const y = graphH - (level + 1) * (nodeH + gapY);
    const totalW = nodes.length * (nodeW + gapX);
    const startX = Math.max(20, 20 + level * 30); // stagger levels

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const x = startX + i * (nodeW + gapX + Math.min(n.resolved.length * 3, 60));

      nodePositions[n.uri] = { x: x + nodeW/2, y: y + nodeH/2 };

      const div = document.createElement('div');
      div.className = 'gnode ' + (n.level === 0 ? 'atom' : n.level === 1 ? 'l1' : 'fragment');
      if (focusChain.includes(n.uri)) div.className += ' focused';
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.style.background = levelColors[Math.min(n.level, levelColors.length - 1)];

      const display = n.resolved.length > 15 ? n.resolved.slice(0, 13) + '..' : n.resolved;
      div.textContent = display;
      div.title = 'L' + n.level + ': ' + n.resolved + '\n' + n.uri;
      div.onclick = () => clickNode(encodeURIComponent(n.uri));
      container.appendChild(div);
    }
  }

  // Draw edges from fragments to their items
  for (const n of allNodes) {
    if (n.kind !== 'Fragment') continue;
    const parentPos = nodePositions[n.uri];
    if (!parentPos) continue;

    // Get node details for edges
    fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: n.uri}) })
      .then(r => r.json())
      .then(data => {
        if (!data.node || !data.node.items) return;
        for (const itemUri of data.node.items) {
          const childPos = nodePositions[itemUri];
          if (childPos) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', parentPos.x);
            line.setAttribute('y1', parentPos.y);
            line.setAttribute('x2', childPos.x);
            line.setAttribute('y2', childPos.y);
            line.setAttribute('class', 'edge');
            svg.appendChild(line);
          }
        }
        // Left/right constituent edges (colored)
        if (data.node.left) {
          const lPos = nodePositions[data.node.left];
          if (lPos) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
            line.setAttribute('x2', lPos.x); line.setAttribute('y2', lPos.y);
            line.setAttribute('class', 'edge left-const');
            svg.appendChild(line);
          }
        }
        if (data.node.right) {
          const rPos = nodePositions[data.node.right];
          if (rPos) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
            line.setAttribute('x2', rPos.x); line.setAttribute('y2', rPos.y);
            line.setAttribute('class', 'edge right-const');
            svg.appendChild(line);
          }
        }
      });
  }
}

async function clickNode(encodedUri) {
  try {
    const uri = decodeURIComponent(encodedUri);
    const node = allNodes.find(n => n.uri === uri);

    if (node && node.level > 0 && node.kind === 'Fragment') {
      // Decompose fragment into chain items
      const resp = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri}) });
      if (resp.ok) {
        const data = await resp.json();
        if (data.node && data.node.items && data.node.items.length > 1) {
          // Verify all items exist in allNodes before using them
          const validItems = data.node.items.filter(u => allNodes.some(n => n.uri === u));
          focusChain = validItems.length > 1 ? [...validItems] : [uri];
        } else {
          focusChain = [uri];
        }
      } else {
        focusChain = [uri];
      }
    } else if (!node) {
      // URI not found in allNodes — refresh and retry
      await refreshAll();
      focusChain = [];
      renderChain();
      return;
    } else {
      focusChain = [uri];
    }

    // Filter chain to only valid URIs
    focusChain = focusChain.filter(u => allNodes.some(n => n.uri === u));
    if (focusChain.length === 0) {
      renderChain();
      renderNodeList();
      return;
    }

    const focusResp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: focusChain[0], chainContext: focusChain})});
    if (focusResp.ok) {
      focusData = await focusResp.json();
    } else {
      focusData = { focus: { uri: focusChain[0], resolved: '?', level: 0 }, left: [], right: [], containingFragments: [], annotations: [] };
    }

    // Fetch chain-level hypermedia (inner/outer neighbors)
    chainData = null;
    if (focusChain.length >= 1) {
      try {
        const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
        if (chainResp.ok) chainData = await chainResp.json();
      } catch {}
    }

    updateUrl();
    renderChain();
    renderNodeList();
    renderGraph();
  } catch (err) {
    console.error('clickNode error:', err);
    focusChain = [];
    focusData = null;
    renderChain();
    renderNodeList();
    renderGraph();
  }
}

async function renderChain() {
  const display = document.getElementById('chainDisplay');
  const info = document.getElementById('chainInfo');

  if (focusChain.length === 0) {
    display.innerHTML = '<span style="color:#999">Click a node in the graph to focus</span>';
    info.textContent = '';
    return;
  }

  // Use /api/chain data for inner/outer neighbors
  const innerLeft = chainData?._links?.innerLeft || [];
  const innerRight = chainData?._links?.innerRight || [];
  const outerLeft = chainData?._links?.outerLeft || [];
  const outerRight = chainData?._links?.outerRight || [];
  const chainFrag = chainData?.chainFragment;

  // Only show outer level when chain is 2+ items AND the chain exists as a fragment
  const hasOuterLevel = focusChain.length >= 2 && chainFrag;

  // Deduplicate: remove outer neighbors that also appear as inner neighbors
  const innerLeftUris = new Set(innerLeft.map(n => n.uri));
  const innerRightUris = new Set(innerRight.map(n => n.uri));
  const filteredOuterLeft = outerLeft.filter(n => !innerLeftUris.has(n.uri));
  const filteredOuterRight = outerRight.filter(n => !innerRightUris.has(n.uri));

  let html = '';

  // ── OUTER LEFT: neighbors of the chain-as-unit (only for multi-item chains that exist as fragments) ──
  if (hasOuterLevel) {
    if (filteredOuterLeft.length > 0) {
      html += '<span class="options-stack">' + filteredOuterLeft.map(l => '<span class="option-item source" onclick="clickNode(\'' + encodeURIComponent(l.uri) + '\')" title="outer: ' + l.resolved + '">' + l.resolved + '</span>').join('') + '</span>';
      html += '<span class="sep">,</span>';
    }
    html += '<span class="plus" onclick="showAddPopup(\'outer-left\', event)" title="Add before group">+</span>';
    html += '<span class="sep">,</span>';
  }

  // ── OPEN PAREN ──
  if (hasOuterLevel) {
    html += '<span class="paren"><a href="/node/' + encodeURIComponent(chainFrag.uri) + '" onclick="event.preventDefault(); clickNode(\'' + encodeURIComponent(chainFrag.uri) + '\')" title="' + chainFrag.resolved + '" style="color:#888;text-decoration:none">(</a></span>';
  }

  // ── INNER LEFT: sequence extensions ──
  html += '<span class="plus" onclick="showAddPopup(\'left\', event)" title="Extend sequence left">+</span>';
  if (innerLeft.length > 0) {
    html += '<span class="sep">,</span>';
    html += '<span class="options-stack">' + innerLeft.map(l => '<span class="option-item source" onclick="expandLeft(\'' + encodeURIComponent(l.uri) + '\')" title="' + l.resolved + '">' + l.resolved + '</span>').join('') + '</span>';
  }

  // ── CHAIN ITEMS ──
  for (let i = 0; i < focusChain.length; i++) {
    const uri = focusChain[i];
    const node = allNodes.find(n => n.uri === uri);
    const resolved = node ? node.resolved : '?';
    const isNested = node && node.level > 0;

    html += '<span class="sep">,</span>';

    if (isNested) {
      html += '<span class="item nested-item" onclick="clickNode(\'' + encodeURIComponent(uri) + '\')" title="' + resolved + '">(' + resolved + ')</span>';
    } else {
      html += '<span class="item atom" onclick="clickNode(\'' + encodeURIComponent(uri) + '\')" title="' + resolved + '">' + resolved + '</span>';
    }
  }

  // ── INNER RIGHT: sequence extensions ──
  if (innerRight.length > 0) {
    html += '<span class="sep">,</span>';
    html += '<span class="options-stack">' + innerRight.map(r => '<span class="option-item target" onclick="expandRight(\'' + encodeURIComponent(r.uri) + '\')" title="' + r.resolved + '">' + r.resolved + '</span>').join('') + '</span>';
  }
  html += '<span class="sep">,</span>';
  html += '<span class="plus" onclick="showAddPopup(\'right\', event)" title="Extend sequence right">+</span>';

  // ── CLOSE PAREN ──
  if (hasOuterLevel) {
    html += '<span class="paren">)</span>';
  }

  // ── OUTER RIGHT: neighbors of the chain-as-unit ──
  if (hasOuterLevel) {
    html += '<span class="sep">,</span>';
    html += '<span class="plus" onclick="showAddPopup(\'outer-right\', event)" title="Add after group">+</span>';
    if (filteredOuterRight.length > 0) {
      html += '<span class="sep">,</span>';
      html += '<span class="options-stack">' + filteredOuterRight.map(r => '<span class="option-item target" onclick="clickNode(\'' + encodeURIComponent(r.uri) + '\')" title="outer: ' + r.resolved + '">' + r.resolved + '</span>').join('') + '</span>';
    }
  }

  // Controls (collapse only — no wrap button, wrap already exists in lattice)
  if (focusChain.length >= 2) {
    html += '<br><span style="display:inline-block;margin-top:6px">';
    html += '<button style="background:#8a4a4a;color:#fff;border:none;padding:3px 10px;font-size:10px;border-radius:3px;cursor:pointer;margin-right:4px" onclick="collapseLeft()">- left</button>';
    html += '<button style="background:#8a4a4a;color:#fff;border:none;padding:3px 10px;font-size:10px;border-radius:3px;cursor:pointer" onclick="collapseRight()">- right</button>';
    html += '</span>';
  }

  display.innerHTML = html;

  // Chain info with + notation — nested items get parens
  const chainItems = focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    if (!n) return '?';
    return n.level > 0 ? '(' + n.resolved + ')' : n.resolved;
  });
  info.textContent = '+,(+,' + chainItems.join(' ') + ',+),+';
}

async function wrapChain() {
  if (focusChain.length < 2) return;
  // Ingest the chain URIs as a fragment
  const resp = await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
  const data = await resp.json();
  await refreshAll();
  // The response has the top fragment URI
  if (data.uri) {
    focusChain = [data.uri];
  }
  await renderChain();
  renderNodeList();
  renderGraph();
}

function collapseLeft() {
  if (focusChain.length > 1) { focusChain.shift(); renderChain(); renderNodeList(); renderGraph(); }
}
function collapseRight() {
  if (focusChain.length > 1) { focusChain.pop(); renderChain(); renderNodeList(); renderGraph(); }
}
function collapseLeftTo(idx) {
  // Keep only items from idx onwards
  focusChain = focusChain.slice(idx);
  renderChain(); renderNodeList(); renderGraph();
}
function collapseRightTo(idx) {
  // Keep only items up to and including idx
  focusChain = focusChain.slice(0, idx + 1);
  renderChain(); renderNodeList(); renderGraph();
}

async function expandLeft(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  if (!allNodes.some(n => n.uri === uri)) { await refreshAll(); return; }
  focusChain.unshift(uri);
  // Refetch chain data for new chain
  try {
    const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
    if (chainResp.ok) chainData = await chainResp.json();
  } catch {}
  updateUrl();
  await renderChain();
  renderNodeList();
  renderGraph();
}

async function expandRight(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  if (!allNodes.some(n => n.uri === uri)) { await refreshAll(); return; }
  focusChain.push(uri);
  try {
    const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
    if (chainResp.ok) chainData = await chainResp.json();
  } catch {}
  updateUrl();
  await renderChain();
  renderNodeList();
  renderGraph();
}

function showAddPopup(side, event) {
  // Remove existing popup
  document.querySelectorAll('.add-popup').forEach(p => p.remove());

  const popup = document.createElement('div');
  popup.className = 'add-popup';
  popup.style.left = event.clientX + 'px';
  popup.style.top = (event.clientY - 40) + 'px';

  const input = document.createElement('input');
  input.placeholder = side === 'left' ? '+ source' : '+ target';
  input.autofocus = true;

  const dropdown = document.createElement('div');
  dropdown.className = 'dropdown';

  input.oninput = () => {
    const q = input.value.toLowerCase();
    if (!q) { dropdown.innerHTML = ''; return; }
    const matches = allNodes.filter(n => n.resolved.toLowerCase().includes(q)).slice(0, 6);
    dropdown.innerHTML = matches.map(n =>
      '<div class="dropdown-item" onclick="addToChain(\'' + side + '\',\'' + encodeURIComponent(n.uri) + '\')">' + n.resolved + ' <small style="color:#999">L' + n.level + '</small></div>'
    ).join('');
    if (matches.length === 0 && q.trim()) {
      dropdown.innerHTML = '<div class="dropdown-item" onclick="createAndAdd(\'' + side + '\',\'' + q.trim() + '\')">Create "' + q.trim() + '"</div>';
    }
  };

  input.onkeydown = (e) => {
    if (e.key === 'Escape') popup.remove();
    if (e.key === 'Enter') {
      const v = input.value.trim();
      if (!v) return;
      const match = allNodes.find(n => n.resolved.toLowerCase() === v.toLowerCase());
      if (match) addToChain(side, encodeURIComponent(match.uri));
      else createAndAdd(side, v);
      popup.remove();
    }
  };

  popup.appendChild(input);
  popup.appendChild(dropdown);
  document.body.appendChild(popup);
  setTimeout(() => input.focus(), 50);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', handler); }
    });
  }, 100);
}

async function addToChain(side, encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  const isOuter = side.startsWith('outer-');
  const actualSide = isOuter ? side.replace('outer-', '') : side;

  if (isOuter && focusChain.length >= 1) {
    // Outer add: wrap current chain first, then add new element beside it
    let wrappedUri;
    if (focusChain.length >= 2) {
      const wrapResp = await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
      const wrapData = await wrapResp.json();
      wrappedUri = wrapData.uri;
    } else {
      wrappedUri = focusChain[0];
    }
    await refreshAll();
    if (wrappedUri) {
      focusChain = actualSide === 'left' ? [uri, wrappedUri] : [wrappedUri, uri];
    }
  } else {
    // Inner add: extend the sequence, using URI-based ingestion
    if (actualSide === 'left') focusChain.unshift(uri);
    else focusChain.push(uri);
  }

  // Ingest only the NEW PAIR to avoid flat boundary-crossing artifacts
  if (focusChain.length >= 2) {
    const pairUris = actualSide === 'left'
      ? [focusChain[0], focusChain[1]]
      : [focusChain[focusChain.length - 2], focusChain[focusChain.length - 1]];
    await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: pairUris}) });
  }
  await refreshAll();
  await renderChain();
  document.querySelectorAll('.add-popup').forEach(p => p.remove());
}

async function createAndAdd(side, value) {
  await fetch('/api/ingest', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: value}) });
  await refreshAll();
  const atom = allNodes.find(n => n.resolved === value && n.level === 0);
  if (atom) {
    await addToChain(side, encodeURIComponent(atom.uri));
    return;
  }
  await renderChain();
  document.querySelectorAll('.add-popup').forEach(p => p.remove());
}

// Initial load
refreshAll().then(() => loadFromUrl());
</script>
