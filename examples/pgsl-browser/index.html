<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGSL Browser — Poly-Granular Sequence Lattice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #f5f5f0; color: #333; overflow: hidden; }

  .header { padding: 8px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 12px; z-index: 10; position: relative; }
  .header h1 { font-size: 14px; color: #333; font-weight: 600; }
  .header .stats { font-size: 11px; color: #888; }

  .layout { display: flex; height: calc(100vh - 40px); }

  /* Controls panel */
  .controls { width: 240px; background: #fff; border-right: 1px solid #ddd; padding: 12px; overflow-y: auto; flex-shrink: 0; }
  .controls h2 { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .controls textarea { width: 100%; height: 50px; border: 1px solid #ccc; padding: 6px; font-family: inherit; font-size: 11px; border-radius: 3px; resize: vertical; }
  .controls select { border: 1px solid #ccc; padding: 2px 6px; font-size: 10px; border-radius: 3px; }
  .controls button { background: #4a8a4a; color: #fff; border: none; padding: 3px 10px; font-size: 10px; border-radius: 3px; cursor: pointer; }
  .controls button:hover { background: #5a9a5a; }
  .ctrl-row { display: flex; gap: 4px; margin-top: 4px; margin-bottom: 12px; }

  .node-list { list-style: none; margin-top: 8px; }
  .node-list li { padding: 3px 6px; font-size: 10px; cursor: pointer; border-radius: 2px; margin-bottom: 1px; display: flex; justify-content: space-between; align-items: center; }
  .node-list li:hover { background: #e8e8ff; }
  .node-list li.active { background: #d0d0ff; }
  .node-list .lbl { font-size: 9px; color: #999; padding: 1px 4px; background: #f0f0f0; border-radius: 8px; }

  /* Graph canvas */
  .graph-area { flex: 1; position: relative; overflow: auto; }
  .graph-container { position: relative; min-width: 100%; min-height: 100%; }

  /* Graph nodes */
  .gnode { position: absolute; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; border: 2px solid transparent; transition: all 0.15s; z-index: 2; min-width: 30px; text-align: center; }
  .gnode:hover { transform: scale(1.05); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .gnode.atom { background: #ffe0e0; border-color: #e88; font-weight: 600; }
  .gnode.fragment { background: #e0e8ff; border-color: #88e; min-width: 50px; }
  .gnode.focused { border-color: #f00; border-width: 3px; box-shadow: 0 0 8px rgba(255,0,0,0.3); }
  .gnode.focused-constituent { border-color: #e88; border-width: 2px; }
  .gnode.dimmed { opacity: 0.4; }
  .gnode.overflow-indicator { background: #f0f0f0; border-color: #bbb; font-style: italic; color: #888; cursor: default; }

  /* Edges (SVG overlay) */
  .edges-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  .edge { stroke: #ccc; stroke-width: 1; fill: none; }
  .edge.left-const { stroke: #aaf; stroke-width: 1.5; }
  .edge.right-const { stroke: #faa; stroke-width: 1.5; }

  /* Chain view */
  .chain-panel { position: fixed; bottom: 0; left: 240px; right: 0; background: #fff; border-top: 2px solid #ddd; padding: 12px 20px; z-index: 10; }
  .chain-display { display: flex; align-items: center; gap: 0; flex-wrap: wrap; justify-content: center; font-size: 14px; }
  .chain-display .plus { color: #999; padding: 0 4px; cursor: pointer; font-weight: bold; }
  .chain-display .plus:hover { color: #4a8a4a; }
  .chain-display .item { padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .chain-display .item.atom { background: #ffe0e0; border: 1px solid #e88; }
  .chain-display .item.frag { background: #e0e8ff; border: 1px solid #88e; }
  .chain-display .item.nested-item { background: #f0f0f5; border: 2px solid #666; display: inline-flex; gap: 2px; padding: 2px 4px; align-items: center; }
  .chain-display .item.nested-item .nested-atom { background: #ffe0e0; border: 1px solid #e88; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  .chain-display .item.nested-item .nested-frag { background: #e0e8ff; border: 1px solid #88e; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  .chain-display .sep { color: #ccc; padding: 0 2px; }
  .chain-display .paren { color: #888; font-size: 16px; font-weight: bold; }
  .chain-info { text-align: center; margin-top: 6px; font-size: 10px; color: #888; }

  /* Source/target option stacks */
  .options-stack { display: inline-flex; flex-direction: column; gap: 2px; vertical-align: middle; max-height: 100px; overflow-y: auto; border: 2px dashed #ccc; border-radius: 4px; padding: 3px; cursor: pointer; }
  .options-stack:hover { border-color: #4a4a8a; background: #fafaff; }
  .option-item { display: block; padding: 2px 8px; font-size: 10px; cursor: pointer; border-radius: 3px; white-space: nowrap; }
  .option-item.source { color: #4a8a4a; background: #f0f8f0; border: 1px solid #cde0cd; }
  .option-item.source:hover { background: #d0e8d0; }
  .option-item.target { color: #8a4a8a; background: #f8f0f8; border: 1px solid #e0cde0; }
  .option-item.target:hover { background: #e8d0e8; }
  /* Nested rendering inside options — pointer-events none so outer option handles click */
  .option-item .nested-atom, .option-item .item { background: #ffe0e0; border: 1px solid #e88; padding: 1px 4px; border-radius: 2px; font-size: 9px; display: inline-block; pointer-events: none; }
  .option-item .nested-frag, .option-item .nested-item { background: #e0e8ff; border: 1px solid #88e; padding: 1px 4px; border-radius: 2px; font-size: 9px; display: inline-block; pointer-events: none; }

  /* Add input */
  .add-popup { position: fixed; background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 20; }
  .add-popup input { border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; font-family: inherit; width: 120px; outline: none; }
  .add-popup .dropdown { max-height: 200px; overflow-y: auto; }
  .add-popup .dropdown-item { padding: 3px 8px; font-size: 11px; cursor: pointer; }
  .add-popup .dropdown-item:hover { background: #e8e8ff; }
</style>
</head>
<body>

<div class="header">
  <h1>PGSL Browser</h1>
  <div class="stats" id="stats">Loading...</div>
</div>

<div class="layout">
  <div class="controls">
    <h2>Ingest</h2>
    <textarea id="ingestInput" placeholder="mark is human"></textarea>
    <div class="ctrl-row">
      <button onclick="doIngest()">Ingest</button>
    </div>

    <h2>Constraints</h2>
    <div id="shapeList" style="font-size:10px;margin-bottom:8px"></div>

    <h2>Nodes</h2>
    <ul class="node-list" id="nodeList"></ul>
  </div>

  <div class="graph-area" id="graphArea">
    <div style="padding:4px 12px;background:#f0f0ea;border-bottom:1px solid #ddd;font-size:10px;cursor:pointer;color:#888" onclick="toggleGraph()">
      <span id="graphToggle">&#x25BC;</span> Graph View
    </div>
    <div id="graphContent" style="position:relative;overflow:auto;height:calc(100% - 25px)">
      <svg class="edges-svg" id="edgesSvg"></svg>
      <div class="graph-container" id="graphContainer"></div>
    </div>
  </div>
</div>

<div class="chain-panel" id="chainPanel">
  <div class="chain-display" id="chainDisplay">
    <span style="color:#999">Click a node in the graph to focus</span>
  </div>
  <div class="chain-info" id="chainInfo"></div>
  <div id="constrainArea" style="display:none;border-top:1px dashed #ccc;margin-top:6px;padding-top:6px"></div>
  <div id="constrainBtn" style="display:none"></div>
</div>

<script>
let allNodes = [];
let focusChain = [];
let focusData = null;
let chainData = null; // from /api/chain — inner/outer neighbors
let nodePositions = {}; // uri -> {x, y}

// ── Resolve cache: avoid redundant /api/resolve calls ──
// Maps URI -> resolved data (node object with left, right, items, etc.)
let resolveCache = {};

// Batch-resolve URIs: first check allNodes + resolveCache, then fetch missing ones
// Returns a map of uri -> resolved data
async function batchResolve(uris) {
  const result = {};
  const missing = [];
  for (const uri of uris) {
    if (resolveCache[uri]) {
      result[uri] = resolveCache[uri];
    } else {
      missing.push(uri);
    }
  }
  if (missing.length === 0) return result;

  // Try batch endpoint first, fall back to individual calls
  try {
    const resp = await fetch('/api/resolve', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ uris: missing }),
    });
    if (resp.ok) {
      const data = await resp.json();
      // Handle both batch response formats
      if (data.results && typeof data.results === 'object') {
        for (const uri of missing) {
          if (data.results[uri]) {
            resolveCache[uri] = data.results[uri];
            result[uri] = data.results[uri];
          }
        }
        return result;
      } else if (data.node) {
        // Single-URI response — server doesn't support batch
        resolveCache[missing[0]] = data;
        result[missing[0]] = data;
        // Fetch remaining individually
        for (let i = 1; i < missing.length; i++) {
          try {
            const r = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ uri: missing[i] }) });
            if (r.ok) { const d = await r.json(); resolveCache[missing[i]] = d; result[missing[i]] = d; }
          } catch {}
        }
        return result;
      }
    }
  } catch {}

  // Fallback: individual calls
  await Promise.all(missing.map(async (uri) => {
    try {
      const r = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ uri }) });
      if (r.ok) { const d = await r.json(); resolveCache[uri] = d; result[uri] = d; }
    } catch {}
  }));
  return result;
}

// Resolve a single URI, using cache
async function resolveUri(uri) {
  if (resolveCache[uri]) return resolveCache[uri];
  try {
    const r = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ uri }) });
    if (r.ok) { const d = await r.json(); resolveCache[uri] = d; return d; }
  } catch {}
  return null;
}

// ── URL-based navigation ──
function uriToHash(uri) {
  const parts = uri.split(':');
  return parts[parts.length - 1] || uri;
}

function hashToUri(hash) {
  const node = allNodes.find(n => n.uri.endsWith(':' + hash));
  return node ? node.uri : null;
}

function updateUrl() {
  if (focusChain.length === 1) {
    history.pushState(null, '', '/node/' + uriToHash(focusChain[0]));
  } else if (focusChain.length > 1) {
    history.pushState(null, '', '/node/' + uriToHash(focusChain[0]) + '?chain=' + focusChain.map(uriToHash).join(','));
  }
}

function loadFromUrl() {
  const path = window.location.pathname;
  if (path.startsWith('/node/')) {
    const hash = path.slice(6);
    const params = new URLSearchParams(window.location.search);
    const chainParam = params.get('chain');

    setTimeout(() => {
      const uri = hashToUri(hash);
      if (!uri) return;

      if (chainParam) {
        const chainUris = chainParam.split(',').map(h => hashToUri(h)).filter(Boolean);
        if (chainUris.length > 0) focusChain = chainUris;
        else focusChain = [uri];
      } else {
        focusChain = [uri];
      }
      if (focusChain.length > 0) clickNode(encodeURIComponent(focusChain[0]));
    }, 500);
  }
}

window.addEventListener('popstate', loadFromUrl);

async function doIngest() {
  const content = document.getElementById('ingestInput').value.trim();
  if (!content) return;
  await fetch('/api/ingest', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content, granularity: 'word' }),
  });
  document.getElementById('ingestInput').value = '';
  resolveCache = {};
  await refreshAll();
}

async function refreshAll() {
  const resp = await fetch('/api/all');
  const data = await resp.json();
  allNodes = data.nodes;
  document.getElementById('stats').textContent =
    data.stats.totalNodes + ' nodes | ' + data.stats.atoms + ' atoms | ' + data.stats.fragments + ' frags | L0-L' + data.stats.maxLevel;
  renderNodeList();
  renderGraph();
}

function renderNodeList() {
  const list = document.getElementById('nodeList');
  const sorted = [...allNodes].filter(n => n.level !== 1).sort((a, b) => a.level - b.level || a.resolved.localeCompare(b.resolved));
  list.innerHTML = sorted.map(n => {
    const chainFragUri = chainData?.chainFragment?.uri;
    const active = (chainFragUri && n.uri === chainFragUri) ? ' active' : focusChain.includes(n.uri) ? ' active' : '';
    const display = n.resolved.length > 20 ? n.resolved.slice(0, 18) + '..' : n.resolved;
    return '<li class="' + active + '" data-action="click-node" data-uri="' + encodeURIComponent(n.uri) + '">' +
      '<span>' + display + '</span><span class="lbl">L' + n.level + '</span></li>';
  }).join('');
}

// Delegated click handler for node list
document.getElementById('nodeList').addEventListener('click', function(e) {
  const li = e.target.closest('li[data-action="click-node"]');
  if (li) {
    e.stopPropagation();
    clickNode(li.dataset.uri);
  }
});

async function renderGraph() {
  const container = document.getElementById('graphContainer');
  const svg = document.getElementById('edgesSvg');
  container.innerHTML = '';
  svg.innerHTML = '';
  nodePositions = {};

  if (allNodes.length === 0) return;

  const visibleNodes = allNodes.filter(n => n.level !== 1);

  // Group by level
  const levels = {};
  let maxLevel = 0;
  for (const n of visibleNodes) {
    if (!levels[n.level]) levels[n.level] = [];
    levels[n.level].push(n);
    if (n.level > maxLevel) maxLevel = n.level;
  }

  // Collect constituent URIs using cached resolve data
  const constituentUris = new Set();
  async function collectConstituents(uri) {
    if (constituentUris.has(uri)) return;
    constituentUris.add(uri);
    // Use allNodes data first, then cache
    const node = allNodes.find(x => x.uri === uri);
    if (node && node.level > 0) {
      const data = await resolveUri(uri);
      if (data?.node?.left) await collectConstituents(data.node.left);
      if (data?.node?.right) await collectConstituents(data.node.right);
      if (data?.node?.items) for (const item of data.node.items) constituentUris.add(item);
    }
  }
  const chainFragUri0 = chainData?.chainFragment?.uri;
  if (chainFragUri0) await collectConstituents(chainFragUri0);
  for (const u of focusChain) constituentUris.add(u);

  // Scale node sizes based on total count
  const totalVisible = visibleNodes.length;
  const scaleFactor = totalVisible > 50 ? 0.7 : totalVisible > 30 ? 0.85 : 1.0;
  const nodeW = Math.round(60 * scaleFactor);
  const nodeH = Math.round(30 * scaleFactor);
  const gapX = Math.round(20 * scaleFactor);
  const gapY = Math.round(50 * scaleFactor);
  const fontSize = totalVisible > 50 ? '9px' : totalVisible > 30 ? '10px' : '11px';
  const MAX_VISIBLE_PER_LEVEL = 30;

  const levelColors = ['#ffe0e0', '#fff0d0', '#e0f0e0', '#e0e8ff', '#e8e0ff', '#f0e0ff', '#ffe0f0', '#e0ffff'];

  // Pre-resolve all fragment nodes we need edges for
  const fragmentUrisForEdges = visibleNodes.filter(n => n.kind === 'Fragment' && n.level >= 2).map(n => n.uri);
  const edgeResolveData = await batchResolve(fragmentUrisForEdges);

  // Calculate actual graph height considering row wrapping
  let maxRowBottom = 0;

  requestAnimationFrame(() => {
    const frag = document.createDocumentFragment();

    for (let level = 0; level <= maxLevel; level++) {
      const allNodesAtLevel = levels[level] || [];
      if (allNodesAtLevel.length === 0) continue;

      const capped = allNodesAtLevel.length > MAX_VISIBLE_PER_LEVEL;
      const nodes = capped ? allNodesAtLevel.slice(0, MAX_VISIBLE_PER_LEVEL) : allNodesAtLevel;

      // Row wrapping: use sqrt-based columns
      const cols = Math.ceil(Math.sqrt(nodes.length));
      const baseY = 40 + level * (nodeH + gapY) * 2;
      const startX = Math.max(20, 20 + level * 20);

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        const col = i % cols;
        const row = Math.floor(i / cols);
        const labelLen = n.level === 0 ? n.resolved.length : n.resolved.length + 2;
        const colWidth = nodeW + gapX + Math.min(labelLen * 4 * scaleFactor, 100 * scaleFactor);
        const x = startX + col * colWidth;
        const y = baseY + row * (nodeH + gapY);

        nodePositions[n.uri] = { x: x + nodeW / 2, y: y + nodeH / 2 };
        if (y + nodeH > maxRowBottom) maxRowBottom = y + nodeH;

        const div = document.createElement('div');
        div.className = 'gnode ' + (n.level === 0 ? 'atom' : 'fragment');
        const chainFragUri = chainData?.chainFragment?.uri;
        const isFocus = (chainFragUri && n.uri === chainFragUri) || (!chainFragUri && focusChain.length === 1 && n.uri === focusChain[0]);
        const isConstituent = focusChain.includes(n.uri) || constituentUris.has(n.uri);
        if (isFocus) {
          div.className += ' focused';
        } else if (isConstituent) {
          div.className += ' focused-constituent';
        } else if (focusChain.length > 0) {
          div.className += ' dimmed';
        }
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.fontSize = fontSize;
        div.style.background = levelColors[Math.min(n.level, levelColors.length - 1)];

        if (n.level === 0) {
          div.textContent = n.resolved;
        } else {
          const display = n.resolved.length > 18 ? n.resolved.slice(0, 16) + '..' : n.resolved;
          div.textContent = '(' + display + ')';
          div.style.color = '#555';
        }
        div.title = 'L' + n.level + ': (' + n.resolved + ')\n' + n.uri;
        div.dataset.action = 'click-node';
        div.dataset.uri = encodeURIComponent(n.uri);
        frag.appendChild(div);
      }

      // Overflow indicator
      if (capped) {
        const remaining = allNodesAtLevel.length - MAX_VISIBLE_PER_LEVEL;
        const lastCol = nodes.length % cols;
        const lastRow = Math.floor(nodes.length / cols);
        const x = startX + lastCol * (nodeW + gapX + 60 * scaleFactor);
        const y = baseY + lastRow * (nodeH + gapY);
        const indicator = document.createElement('div');
        indicator.className = 'gnode overflow-indicator';
        indicator.style.left = x + 'px';
        indicator.style.top = y + 'px';
        indicator.style.fontSize = fontSize;
        indicator.textContent = '...and ' + remaining + ' more';
        indicator.title = remaining + ' additional L' + level + ' nodes not shown';
        frag.appendChild(indicator);
        if (y + nodeH > maxRowBottom) maxRowBottom = y + nodeH;
      }
    }

    container.appendChild(frag);
    // Auto-fit container height
    container.style.minHeight = (maxRowBottom + 80) + 'px';

    // Draw edges using pre-resolved data
    for (const n of visibleNodes) {
      if (n.kind !== 'Fragment' || n.level < 2) continue;
      const parentPos = nodePositions[n.uri];
      if (!parentPos) continue;

      const data = edgeResolveData[n.uri];
      if (!data?.node?.left || !data?.node?.right) continue;

      const isDimmed = focusChain.length > 0 && !constituentUris.has(n.uri);

      // Resolve through L1 wrappers using allNodes data
      const resolveThrough = (uri) => {
        const node = allNodes.find(x => x.uri === uri);
        if (node && node.level === 1) {
          const cached = resolveCache[uri];
          if (cached?.node?.items?.[0]) return cached.node.items[0];
          // If not cached, try to find the atom in allNodes that this L1 wraps
          return uri;
        }
        return uri;
      };

      const leftTarget = resolveThrough(data.node.left);
      const rightTarget = resolveThrough(data.node.right);

      const lPos = nodePositions[leftTarget];
      if (lPos) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
        line.setAttribute('x2', lPos.x); line.setAttribute('y2', lPos.y);
        line.setAttribute('class', 'edge left-const');
        if (isDimmed) line.style.opacity = '0.15';
        svg.appendChild(line);
      }
      const rPos = nodePositions[rightTarget];
      if (rPos) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
        line.setAttribute('x2', rPos.x); line.setAttribute('y2', rPos.y);
        line.setAttribute('class', 'edge right-const');
        if (isDimmed) line.style.opacity = '0.15';
        svg.appendChild(line);
      }
    }

    // Also pre-resolve L1 wrappers for edge drawing
    // Collect L1 URIs referenced as left/right in edges
    const l1Uris = [];
    for (const n of visibleNodes) {
      if (n.kind !== 'Fragment' || n.level < 2) continue;
      const data = edgeResolveData[n.uri];
      if (!data?.node) continue;
      for (const childUri of [data.node.left, data.node.right].filter(Boolean)) {
        const childNode = allNodes.find(x => x.uri === childUri);
        if (childNode && childNode.level === 1 && !resolveCache[childUri]) {
          l1Uris.push(childUri);
        }
      }
    }
    if (l1Uris.length > 0) {
      batchResolve(l1Uris).then(() => {
        // Re-draw edges that needed L1 resolution
        // Clear and redraw SVG edges
        svg.innerHTML = '';
        for (const n of visibleNodes) {
          if (n.kind !== 'Fragment' || n.level < 2) continue;
          const parentPos = nodePositions[n.uri];
          if (!parentPos) continue;
          const data = edgeResolveData[n.uri];
          if (!data?.node?.left || !data?.node?.right) continue;
          const isDimmed = focusChain.length > 0 && !constituentUris.has(n.uri);

          const resolveThrough2 = (uri) => {
            const node = allNodes.find(x => x.uri === uri);
            if (node && node.level === 1) {
              const cached = resolveCache[uri];
              if (cached?.node?.items?.[0]) return cached.node.items[0];
              return uri;
            }
            return uri;
          };

          const lt = resolveThrough2(data.node.left);
          const rt = resolveThrough2(data.node.right);

          const lp = nodePositions[lt];
          if (lp) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
            line.setAttribute('x2', lp.x); line.setAttribute('y2', lp.y);
            line.setAttribute('class', 'edge left-const');
            if (isDimmed) line.style.opacity = '0.15';
            svg.appendChild(line);
          }
          const rp = nodePositions[rt];
          if (rp) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', parentPos.x); line.setAttribute('y1', parentPos.y);
            line.setAttribute('x2', rp.x); line.setAttribute('y2', rp.y);
            line.setAttribute('class', 'edge right-const');
            if (isDimmed) line.style.opacity = '0.15';
            svg.appendChild(line);
          }
        }
      });
    }
  });
}

async function clickNode(encodedUri) {
  try {
    const uri = decodeURIComponent(encodedUri);
    const node = allNodes.find(n => n.uri === uri);

    if (constraintMode) return;

    if (node && node.level > 0 && node.kind === 'Fragment') {
      const data = await resolveUri(uri);
      if (data?.node?.items && data.node.items.length > 1) {
        const validItems = data.node.items.filter(u => allNodes.some(n => n.uri === u));
        focusChain = validItems.length > 1 ? [...validItems] : [uri];
      } else {
        focusChain = [uri];
      }
    } else if (!node) {
      await refreshAll();
      focusChain = [];
      renderChain();
      return;
    } else {
      focusChain = [uri];
    }

    focusChain = focusChain.filter(u => allNodes.some(n => n.uri === u));
    if (focusChain.length === 0) {
      renderChain();
      renderNodeList();
      return;
    }

    const focusResp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: focusChain[0], chainContext: focusChain})});
    if (focusResp.ok) {
      focusData = await focusResp.json();
    } else {
      focusData = { focus: { uri: focusChain[0], resolved: '?', level: 0 }, left: [], right: [], containingFragments: [], annotations: [] };
    }

    chainData = null;
    if (focusChain.length >= 1) {
      try {
        const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
        if (chainResp.ok) chainData = await chainResp.json();
      } catch {}
    }

    updateUrl();
    renderChain();
    renderNodeList();
    renderGraph();
  } catch (err) {
    console.error('clickNode error:', err);
    focusChain = [];
    focusData = null;
    renderChain();
    renderNodeList();
    renderGraph();
  }
}

// Render a node as HTML using cached data
// When `bare` is true, returns just the inner content (for use inside option-items)
function renderNodeHtml(uri, bare) {
  const node = allNodes.find(n => n.uri === uri);
  if (!node) return bare ? '?' : '<span class="item atom">?</span>';
  const resolved = node.resolved;
  const isFragment = node.level > 0 && node.kind === 'Fragment';

  if (isFragment) {
    const cached = resolveCache[uri];
    if (cached?.node?.items) {
      let inner = '';
      for (const itemUri of cached.node.items) {
        const itemNode = allNodes.find(n => n.uri === itemUri);
        const itemResolved = itemNode ? itemNode.resolved : '?';
        const isSubFrag = itemNode && itemNode.level > 0;
        inner += '<span class="' + (isSubFrag ? 'nested-frag' : 'nested-atom') + '">' + itemResolved + '</span>';
      }
      if (bare) return inner;
      return '<span class="item nested-item" title="' + resolved + '">' + inner + '</span>';
    }
  }
  if (bare) return resolved;
  return '<span class="item atom" title="' + resolved + '">' + resolved + '</span>';
}

async function renderChain() {
  const display = document.getElementById('chainDisplay');
  const info = document.getElementById('chainInfo');

  if (focusChain.length === 0) {
    display.innerHTML = '<span style="color:#999">Click a node in the graph to focus</span>';
    info.textContent = '';
    return;
  }

  const chainValues = focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    return n ? n.resolved : '?';
  });

  const innerLeft = chainData?._links?.innerLeft || [];
  const innerRight = chainData?._links?.innerRight || [];
  const outerLeft = chainData?._links?.outerLeft || [];
  const outerRight = chainData?._links?.outerRight || [];
  const chainFrag = chainData?.chainFragment;

  const hasOuterLevel = true;

  const innerLeftUris = new Set(innerLeft.map(n => n.uri));
  const innerRightUris = new Set(innerRight.map(n => n.uri));
  const filteredOuterLeft = outerLeft.filter(n => !innerLeftUris.has(n.uri));
  const filteredOuterRight = outerRight.filter(n => !innerRightUris.has(n.uri));

  // Pre-resolve all URIs we'll need for rendering
  const urisToResolve = [];
  for (const l of filteredOuterLeft) urisToResolve.push(l.uri);
  for (const l of innerLeft) urisToResolve.push(l.uri);
  for (const r of innerRight) urisToResolve.push(r.uri);
  for (const r of filteredOuterRight) urisToResolve.push(r.uri);
  for (const uri of focusChain) {
    const node = allNodes.find(n => n.uri === uri);
    if (node && node.level > 0 && node.kind === 'Fragment') urisToResolve.push(uri);
  }
  if (urisToResolve.length > 0) await batchResolve(urisToResolve);

  let html = '';

  // OUTER LEFT paradigm box — what can appear before the group
  if (hasOuterLevel) {
    const outerParadigm = chainData?._outerParadigm;
    let olHtml = '<span class="plus" data-action="show-add" data-side="outer-left" title="Add before group">+</span>';
    if (filteredOuterLeft.length > 0) {
      for (const l of filteredOuterLeft) {
        const innerRender = renderNodeHtml(l.uri, true);
        olHtml += '<span class="option-item source" data-action="expand-left" data-uri="' + encodeURIComponent(l.uri) + '" title="outer: ' + l.resolved + '">' + innerRender + '</span>';
      }
    }
    // Add constrain link for outer left paradigm — always available
    // Use server-provided pattern if exists, otherwise build from chain values
    {
      const olPattern = outerParadigm?.leftPattern ?? ['?', ...chainValues];
      const olPos = outerParadigm?.leftPosition ?? 0;
      const olPatternId = '_olp_' + Date.now();
      window[olPatternId] = olPattern;
      olHtml += '<span data-action="constrain-paradigm" data-pattern-id="' + olPatternId + '" data-position="' + olPos + '" style="font-size:8px;color:#4a4a8a;cursor:pointer;text-align:center;padding:1px 4px;border-top:1px dashed #ccc;margin-top:1px" title="Constrain this outer paradigm">constrain</span>';
    }
    html += '<span class="options-stack">' + olHtml + '</span>';
    html += '<span class="sep">,</span>';
  }

  // OPEN PAREN
  if (chainFrag) {
    html += '<span class="paren"><a href="/node/' + encodeURIComponent(chainFrag.uri) + '" data-action="click-node" data-uri="' + encodeURIComponent(chainFrag.uri) + '" title="' + chainFrag.resolved + '" style="color:#888;text-decoration:none">(</a></span>';
  } else {
    html += '<span class="paren">(</span>';
  }

  // COLLAPSE LEFT
  if (focusChain.length >= 2) {
    html += '<span class="plus" data-action="collapse-left" title="Collapse from left" style="color:#8a4a4a;cursor:pointer;font-weight:bold">&gt;</span>';
    html += '<span class="sep">,</span>';
  }

  // INNER LEFT paradigm box
  {
    const leftPattern = ['?', ...chainValues];
    const leftPatternId = '_lp_' + Date.now();
    window[leftPatternId] = leftPattern;
    let leftHtml = '<span class="plus" data-action="show-add" data-side="left" title="Add to this paradigm">+</span>';
    for (const l of innerLeft) {
      const innerRender = renderNodeHtml(l.uri, true);
      leftHtml += '<span class="option-item source" data-action="expand-left" data-uri="' + encodeURIComponent(l.uri) + '" title="' + l.resolved + '">' + innerRender + '</span>';
    }
    leftHtml += '<span data-action="constrain-paradigm" data-pattern-id="' + leftPatternId + '" data-position="0" style="font-size:8px;color:#4a4a8a;cursor:pointer;text-align:center;padding:1px 4px;border-top:1px dashed #ccc;margin-top:1px" title="Constrain this paradigm">constrain</span>';
    html += '<span class="options-stack">' + leftHtml + '</span>';
  }

  // CHAIN ITEMS — use pre-resolved data
  const nestedItems = {};
  for (const uri of focusChain) {
    const node = allNodes.find(n => n.uri === uri);
    if (node && node.level > 0 && node.kind === 'Fragment') {
      const cached = resolveCache[uri];
      if (cached?.node?.items) nestedItems[uri] = cached.node.items;
    }
  }

  for (let i = 0; i < focusChain.length; i++) {
    const uri = focusChain[i];
    const node = allNodes.find(n => n.uri === uri);
    const resolved = node ? node.resolved : '?';
    const isNested = node && node.level > 0 && node.kind === 'Fragment';

    html += '<span class="sep">,</span>';

    if (isNested && nestedItems[uri]) {
      const items = nestedItems[uri];
      let innerHtml = '';
      for (const itemUri of items) {
        const itemNode = allNodes.find(n => n.uri === itemUri);
        const itemResolved = itemNode ? itemNode.resolved : '?';
        const isSubNested = itemNode && itemNode.level > 0;
        const cls = isSubNested ? 'nested-frag' : 'nested-atom';
        innerHtml += '<span class="' + cls + '">' + itemResolved + '</span>';
      }
      html += '<span class="item nested-item" data-action="click-node" data-uri="' + encodeURIComponent(uri) + '" title="Click to expand: ' + resolved + '">' + innerHtml + '</span>';
    } else {
      html += '<span class="item atom" data-action="click-node" data-uri="' + encodeURIComponent(uri) + '" title="' + resolved + '">' + resolved + '</span>';
    }
  }

  // INNER RIGHT paradigm box
  {
    html += '<span class="sep">,</span>';
    const rightPattern = [...chainValues, '?'];
    const rightPatternId = '_rp_' + Date.now();
    window[rightPatternId] = rightPattern;
    const rightPos = chainValues.length;
    let rightHtml = '<span class="plus" data-action="show-add" data-side="right" title="Add to this paradigm">+</span>';
    for (const r of innerRight) {
      const innerRender = renderNodeHtml(r.uri, true);
      rightHtml += '<span class="option-item target" data-action="expand-right" data-uri="' + encodeURIComponent(r.uri) + '" title="' + r.resolved + '">' + innerRender + '</span>';
    }
    rightHtml += '<span data-action="constrain-paradigm" data-pattern-id="' + rightPatternId + '" data-position="' + rightPos + '" style="font-size:8px;color:#4a4a8a;cursor:pointer;text-align:center;padding:1px 4px;border-top:1px dashed #ccc;margin-top:1px" title="Constrain this paradigm">constrain</span>';
    html += '<span class="options-stack">' + rightHtml + '</span>';
  }

  // COLLAPSE RIGHT
  if (focusChain.length >= 2) {
    html += '<span class="sep">,</span>';
    html += '<span class="plus" data-action="collapse-right" title="Collapse from right" style="color:#8a4a4a;cursor:pointer;font-weight:bold">&lt;</span>';
  }

  // CLOSE PAREN
  if (hasOuterLevel) {
    html += '<span class="paren">)</span>';
  }

  // OUTER RIGHT paradigm box — what can appear after the group
  if (hasOuterLevel) {
    html += '<span class="sep">,</span>';
    const outerParadigm = chainData?._outerParadigm;
    let orHtml = '<span class="plus" data-action="show-add" data-side="outer-right" title="Add after group">+</span>';
    if (filteredOuterRight.length > 0) {
      for (const r of filteredOuterRight) {
        const innerRender = renderNodeHtml(r.uri, true);
        orHtml += '<span class="option-item target" data-action="expand-right" data-uri="' + encodeURIComponent(r.uri) + '" title="outer: ' + r.resolved + '">' + innerRender + '</span>';
      }
    }
    // Add constrain link for outer right paradigm — always available
    {
      const orPattern = outerParadigm?.rightPattern ?? [...chainValues, '?'];
      const orPos = outerParadigm?.rightPosition ?? chainValues.length;
      const orPatternId = '_orp_' + Date.now();
      window[orPatternId] = orPattern;
      orHtml += '<span data-action="constrain-paradigm" data-pattern-id="' + orPatternId + '" data-position="' + orPos + '" style="font-size:8px;color:#4a4a8a;cursor:pointer;text-align:center;padding:1px 4px;border-top:1px dashed #ccc;margin-top:1px" title="Constrain this outer paradigm">constrain</span>';
    }
    html += '<span class="options-stack">' + orHtml + '</span>';
  }

  display.innerHTML = html;

  // Chain info
  const chainItems = focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    if (!n) return '?';
    return n.level > 0 ? '(' + n.resolved + ')' : n.resolved;
  });
  info.textContent = '(' + chainItems.join(', ') + ')';
}

// ── Delegated event handler for chain display ──
document.getElementById('chainDisplay').addEventListener('click', function(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;

  e.stopPropagation();
  const action = target.dataset.action;

  switch (action) {
    case 'click-node': {
      if (target.tagName === 'A') e.preventDefault();
      clickNode(target.dataset.uri);
      break;
    }
    case 'show-add': {
      showAddPopup(target.dataset.side, target);
      break;
    }
    case 'expand-left': {
      expandLeft(target.dataset.uri);
      break;
    }
    case 'expand-right': {
      expandRight(target.dataset.uri);
      break;
    }
    case 'collapse-left': {
      collapseLeft();
      break;
    }
    case 'collapse-right': {
      collapseRight();
      break;
    }
    case 'constrain-paradigm': {
      const patternId = target.dataset.patternId;
      const position = parseInt(target.dataset.position, 10);
      const pattern = window[patternId];
      if (pattern) constrainParadigm(pattern, position);
      break;
    }
  }
});

async function wrapChain() {
  if (focusChain.length < 2) return;
  const resp = await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
  const data = await resp.json();
  resolveCache = {};
  await refreshAll();
  if (data.uri) {
    focusChain = [data.uri];
  }
  await renderChain();
  renderNodeList();
  renderGraph();
}

async function collapseLeft() {
  if (focusChain.length > 1) {
    focusChain.shift();
    try { const r = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) }); if (r.ok) chainData = await r.json(); } catch {}
    updateUrl(); renderChain(); renderNodeList(); renderGraph();
  }
}
async function collapseRight() {
  if (focusChain.length > 1) {
    focusChain.pop();
    try { const r = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) }); if (r.ok) chainData = await r.json(); } catch {}
    updateUrl(); renderChain(); renderNodeList(); renderGraph();
  }
}
async function collapseLeftTo(idx) {
  focusChain = focusChain.slice(idx);
  try { const r = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) }); if (r.ok) chainData = await r.json(); } catch {}
  updateUrl(); renderChain(); renderNodeList(); renderGraph();
}
async function collapseRightTo(idx) {
  focusChain = focusChain.slice(0, idx + 1);
  try { const r = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) }); if (r.ok) chainData = await r.json(); } catch {}
  updateUrl(); renderChain(); renderNodeList(); renderGraph();
}

async function expandLeft(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  if (!allNodes.some(n => n.uri === uri)) { await refreshAll(); return; }
  focusChain.unshift(uri);
  try {
    const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
    if (chainResp.ok) chainData = await chainResp.json();
  } catch {}
  updateUrl();
  await renderChain();
  renderNodeList();
  renderGraph();
}

async function expandRight(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  if (!allNodes.some(n => n.uri === uri)) { await refreshAll(); return; }
  focusChain.push(uri);
  try {
    const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
    if (chainResp.ok) chainData = await chainResp.json();
  } catch {}
  updateUrl();
  await renderChain();
  renderNodeList();
  renderGraph();
}

// showAddPopup now takes the clicked element instead of the raw event for positioning
function showAddPopup(side, anchorEl) {
  document.querySelectorAll('.add-popup').forEach(p => p.remove());

  const popup = document.createElement('div');
  popup.className = 'add-popup';

  // Position using getBoundingClientRect on the anchor element
  const rect = anchorEl.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  // Position above the chain panel
  const chainPanel = document.getElementById('chainPanel');
  const panelTop = chainPanel.getBoundingClientRect().top;
  popup.style.bottom = (window.innerHeight - panelTop + 10) + 'px';

  const input = document.createElement('input');
  input.placeholder = side === 'left' || side === 'outer-left' || side === 'require-left' ? '+ source' : '+ target';
  input.autofocus = true;

  const dropdown = document.createElement('div');
  dropdown.className = 'dropdown';

  let shapeConstrained = false;
  let shapeCandidateUris = null;
  let shapeInfo = '';

  (async () => {
    try {
      const actualSide = side.replace('outer-', '').replace('require-', '');
      const resp = await fetch('/api/constraints/candidates', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ currentChain: focusChain, side: actualSide }),
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.constrained && data.candidates) {
          shapeConstrained = true;
          shapeCandidateUris = new Set(data.candidates.map(c => c.uri));
          shapeInfo = data.constraints.join('; ');
          renderDropdown(input.value);
        }
      }
    } catch {}
  })();

  const renderDropdown = (q) => {
    let nodes = allNodes.filter(n => n.level !== 1);
    if (q) nodes = nodes.filter(n => n.resolved.toLowerCase().includes(q.toLowerCase()));
    nodes.sort((a, b) => {
      if (a.resolved === '?') return -1;
      if (b.resolved === '?') return 1;
      if (a.level === 0 && b.level > 0) return -1;
      if (a.level > 0 && b.level === 0) return 1;
      return a.resolved.localeCompare(b.resolved);
    });

    if (shapeConstrained && shapeCandidateUris) {
      const constrained = nodes.filter(n => shapeCandidateUris.has(n.uri));
      const unconstrained = nodes.filter(n => !shapeCandidateUris.has(n.uri));

      let html = '';
      if (shapeInfo) {
        html += '<div style="padding:3px 8px;font-size:9px;color:#8a4a4a;background:#fff0f0;border-bottom:1px solid #eee">\u26a0 ' + shapeInfo + '</div>';
      }
      html += constrained.slice(0, 8).map(n => {
        const isF = n.level > 0;
        const label = isF ? '<span style="background:#e0e8ff;border:1px solid #88e;padding:1px 4px;border-radius:2px;font-size:9px">(' + n.resolved + ')</span>' : n.resolved;
        return '<div class="dropdown-item" data-action="add-to-chain" data-side="' + side + '" data-uri="' + encodeURIComponent(n.uri) + '" style="background:#f0fff0">\u2705 ' + label + '</div>';
      }).join('');
      if (unconstrained.length > 0) {
        html += '<div style="padding:3px 8px;font-size:9px;color:#999;border-top:1px solid #eee">Constraint not met:</div>';
        html += unconstrained.slice(0, 4).map(n => {
          return '<div class="dropdown-item" style="opacity:0.4;text-decoration:line-through">' + n.resolved + '</div>';
        }).join('');
      }
      if (q && q.trim()) {
        html += '<div class="dropdown-item" data-action="create-and-add" data-side="' + side + '" data-value="' + q.trim() + '" style="border-top:1px solid #eee;color:#888">+ Create "' + q.trim() + '"</div>';
      }
      dropdown.innerHTML = html;
    } else {
      let html = nodes.slice(0, 10).map(n => {
        const isF = n.level > 0;
        const label = isF ? '<span style="background:#e0e8ff;border:1px solid #88e;padding:1px 4px;border-radius:2px;font-size:9px">(' + n.resolved + ')</span>' : n.resolved;
        return '<div class="dropdown-item" data-action="add-to-chain" data-side="' + side + '" data-uri="' + encodeURIComponent(n.uri) + '">' + label + '</div>';
      }).join('');
      if (q && q.trim()) {
        html += '<div class="dropdown-item" data-action="create-and-add" data-side="' + side + '" data-value="' + q.trim() + '" style="border-top:1px solid #eee;color:#888">+ Create "' + q.trim() + '"</div>';
      }
      dropdown.innerHTML = html;
    }
  };

  // Delegated click handler for dropdown items
  dropdown.addEventListener('click', function(e) {
    const item = e.target.closest('[data-action]');
    if (!item) return;
    e.stopPropagation();
    if (item.dataset.action === 'add-to-chain') {
      addToChain(item.dataset.side, item.dataset.uri);
      popup.remove();
    } else if (item.dataset.action === 'create-and-add') {
      createAndAdd(item.dataset.side, item.dataset.value);
      popup.remove();
    }
  });

  input.oninput = () => renderDropdown(input.value);
  renderDropdown('');
  input.onfocus = () => renderDropdown(input.value);

  input.onkeydown = (e) => {
    if (e.key === 'Escape') popup.remove();
    if (e.key === 'Enter') {
      const v = input.value.trim();
      if (!v) return;
      const match = allNodes.find(n => n.resolved.toLowerCase() === v.toLowerCase());
      if (match) addToChain(side, encodeURIComponent(match.uri));
      else createAndAdd(side, v);
      popup.remove();
    }
  };

  popup.appendChild(input);
  popup.appendChild(dropdown);
  document.body.appendChild(popup);
  setTimeout(() => input.focus(), 50);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', handler); }
    });
  }, 100);
}

async function addToChain(side, encodedUri) {
  const uri = decodeURIComponent(encodedUri);

  if (side === 'require-right' || side === 'require-left') {
    requireChain.push(uri);
    document.querySelectorAll('.add-popup').forEach(p => p.remove());
    renderRequireChain();
    return;
  }

  const isOuter = side.startsWith('outer-');
  const actualSide = isOuter ? side.replace('outer-', '') : side;

  if (isOuter && focusChain.length >= 1) {
    let wrappedUri;
    if (focusChain.length >= 2) {
      const wrapResp = await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
      const wrapData = await wrapResp.json();
      wrappedUri = wrapData.uri;
    } else {
      wrappedUri = focusChain[0];
    }
    resolveCache = {};
    await refreshAll();
    if (wrappedUri) {
      focusChain = actualSide === 'left' ? [uri, wrappedUri] : [wrappedUri, uri];
    }
  } else {
    if (actualSide === 'left') focusChain.unshift(uri);
    else focusChain.push(uri);
  }

  if (focusChain.length >= 2) {
    await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
  }
  resolveCache = {};
  await refreshAll();
  try {
    const chainResp = await fetch('/api/chain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: focusChain}) });
    if (chainResp.ok) chainData = await chainResp.json();
  } catch {}
  updateUrl();
  await renderChain();
  document.querySelectorAll('.add-popup').forEach(p => p.remove());
}

async function createAndAdd(side, value) {
  await fetch('/api/ingest', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: value}) });
  resolveCache = {};
  await refreshAll();
  const atom = allNodes.find(n => n.resolved === value && n.level === 0);
  if (atom) {
    await addToChain(side, encodeURIComponent(atom.uri));
    return;
  }
  await renderChain();
  document.querySelectorAll('.add-popup').forEach(p => p.remove());
}

function toggleGraph() {
  const content = document.getElementById('graphContent');
  const toggle = document.getElementById('graphToggle');
  if (content.style.display === 'none') {
    content.style.display = 'block';
    toggle.textContent = '\u25BC';
  } else {
    content.style.display = 'none';
    toggle.textContent = '\u25B6';
  }
}

// ── Constraints ──
let constraintMode = false;
let constraintStep = 0;
let constraintPatternA = [];
let constraintPosA = -1;
let constraintOp = null;
let requireChain = [];

let pendingParadigmA = null;

function constrainParadigm(pattern, position) {
  if (!pendingParadigmA) {
    pendingParadigmA = { pattern, position };
    document.getElementById('constrainArea').style.display = 'block';
    document.getElementById('constrainBtn').style.display = 'none';

    let patternHtml = pattern.map((v, i) => i === position
      ? '<span style="color:#228;font-weight:bold">?</span>'
      : '<span style="background:#f5f5f5;border:1px solid #ccc;padding:1px 4px;border-radius:2px;font-size:10px">' + v + '</span>'
    ).join(' ');
    document.getElementById('constrainArea').innerHTML =
      '<div style="text-align:center;font-size:10px;margin-bottom:4px">P(' + patternHtml + ')</div>' +
      '<div style="text-align:center;font-size:9px;color:#888">now click another paradigm box to relate</div>' +
      '<div style="text-align:center;margin-top:4px"><button onclick="cancelConstraint()" style="background:#8a4a4a;color:#fff;border:none;padding:2px 8px;font-size:9px;border-radius:3px;cursor:pointer">cancel</button></div>';
  } else {
    const pA = pendingParadigmA;
    const pB = { pattern, position };

    let htmlA = pA.pattern.map((v, i) => i === pA.position ? '<strong style="color:#228">?</strong>' : v).join(', ');
    let htmlB = pB.pattern.map((v, i) => i === pB.position ? '<strong style="color:#228">?</strong>' : v).join(', ');

    const ops = [
      { op: 'subset', symbol: '\u2286', title: 'Subset \u2014 A must be in B\ne.g., employees \u2286 humans' },
      { op: 'intersect', symbol: '\u2229', title: 'Intersect \u2014 must be in both A and B' },
      { op: 'union', symbol: '\u222a', title: 'Union \u2014 can be in A or B' },
      { op: 'exclude', symbol: '\u2216', title: 'Exclude \u2014 in A but not B' },
      { op: 'equal', symbol: '=', title: 'Equal \u2014 A and B must be same set' },
    ];

    document.getElementById('constrainArea').innerHTML =
      '<div style="text-align:center;font-size:10px;margin-bottom:2px">P(' + htmlA + ')</div>' +
      '<div style="display:flex;gap:4px;justify-content:center;margin:4px 0">' +
        ops.map(o => '<button onclick="finishConstraintTwoClick(\'' + o.op + '\')" style="background:#4a4a8a;color:#fff;border:none;padding:4px 10px;font-size:12px;border-radius:3px;cursor:pointer" title="' + o.title + '">' + o.symbol + '</button>').join('') +
      '</div>' +
      '<div style="text-align:center;font-size:10px;margin-top:2px">P(' + htmlB + ')</div>' +
      '<div style="text-align:center;margin-top:4px"><button onclick="cancelConstraint()" style="background:#8a4a4a;color:#fff;border:none;padding:2px 8px;font-size:9px;border-radius:3px;cursor:pointer">cancel</button></div>';

    window._pendingParadigmB = pB;
  }
}

async function finishConstraintTwoClick(op) {
  const pA = pendingParadigmA;
  const pB = window._pendingParadigmB;
  if (!pA || !pB) return;

  await fetch('/api/constraints', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      patternA: pA.pattern,
      positionA: pA.position,
      patternB: pB.pattern,
      positionB: pB.position,
      op: op,
    }),
  });

  cancelConstraint();
  await refreshConstraints();
}

function startConstraint() {
  if (focusChain.length === 0) return;
  constraintMode = true;
  constraintStep = 1;
  constraintPatternA = focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    return n ? n.resolved : '?';
  });
  constraintPosA = -1;
  constraintOp = null;
  requireChain = [];
  renderConstraintArea();
}

function cancelConstraint() {
  constraintMode = false;
  constraintStep = 0;
  constraintPatternA = [];
  constraintPosA = -1;
  constraintOp = null;
  requireChain = [];
  pendingParadigmA = null;
  window._pendingParadigmB = null;
  document.getElementById('constrainArea').style.display = 'none';
  document.getElementById('constrainBtn').style.display = 'block';
}

function selectConstraintPos(idx) {
  constraintPosA = idx;
  constraintStep = 2;
  renderConstraintArea();
}

function selectConstraintOp(op) {
  constraintOp = op;
  constraintStep = 3;
  renderConstraintArea();
}

function renderConstraintArea() {
  const area = document.getElementById('constrainArea');
  const btn = document.getElementById('constrainBtn');
  area.style.display = 'block';
  btn.style.display = 'none';

  let html = '';

  if (constraintStep === 1) {
    html += '<div style="font-size:9px;color:#888;text-align:center;margin-bottom:4px">select the position to constrain:</div>';
    html += '<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">';
    for (let i = 0; i < constraintPatternA.length; i++) {
      html += '<span onclick="selectConstraintPos(' + i + ')" style="padding:3px 8px;border-radius:3px;cursor:pointer;font-size:11px;background:#f5f5f5;border:1px solid #ccc">' + constraintPatternA[i] + '</span>';
    }
    html += '</div>';
    html += '<div style="text-align:center;margin-top:4px"><button onclick="cancelConstraint()" style="background:#8a4a4a;color:#fff;border:none;padding:2px 8px;font-size:9px;border-radius:3px;cursor:pointer">cancel</button></div>';

  } else if (constraintStep === 2) {
    html += '<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:6px">';
    for (let i = 0; i < constraintPatternA.length; i++) {
      const style = i === constraintPosA
        ? 'background:#d0e0ff;border:2px solid #58f;font-weight:bold'
        : 'background:#f5f5f5;border:1px solid #ccc;color:#888';
      html += '<span style="padding:3px 8px;border-radius:3px;font-size:11px;' + style + '">' + (i === constraintPosA ? '?' : constraintPatternA[i]) + '</span>';
    }
    html += '</div>';
    html += '<div style="font-size:9px;color:#888;text-align:center;margin-bottom:4px">paradigm operation:</div>';
    html += '<div style="display:flex;gap:4px;justify-content:center">';
    const ops = [
      { op: 'subset', symbol: '\u2286', label: '\u2286 Subset (restricts to)', example: 'e.g., employees \u2286 humans \u2014 can only be employee if also human' },
      { op: 'intersect', symbol: '\u2229', label: '\u2229 Intersection (must be in both)', example: 'e.g., managers \u2229 engineers \u2014 must be both a manager and an engineer' },
      { op: 'union', symbol: '\u222a', label: '\u222a Union (can be in either)', example: 'e.g., staff = doctors \u222a nurses \u2014 can be either a doctor or a nurse' },
      { op: 'exclude', symbol: '\u2216', label: '\u2216 Exclusion (must not be in)', example: 'e.g., volunteers \u2216 employees \u2014 volunteers cannot also be employees' },
      { op: 'equal', symbol: '=', label: '= Equality (must be same set)', example: 'e.g., citizens = voters \u2014 exact same set of people' },
    ];
    for (const o of ops) {
      html += '<button onclick="selectConstraintOp(\'' + o.op + '\')" style="background:#4a4a8a;color:#fff;border:none;padding:3px 8px;font-size:10px;border-radius:3px;cursor:pointer" title="' + o.label + '\n' + o.example + '">' + o.symbol + '</button>';
    }
    html += '</div>';
    html += '<div style="text-align:center;margin-top:4px"><button onclick="cancelConstraint()" style="background:#8a4a4a;color:#fff;border:none;padding:2px 8px;font-size:9px;border-radius:3px;cursor:pointer">cancel</button></div>';

  } else if (constraintStep === 3) {
    html += '<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:2px">';
    for (let i = 0; i < constraintPatternA.length; i++) {
      const style = i === constraintPosA ? 'background:#d0e0ff;border:1px solid #58f;font-weight:bold' : 'background:#f5f5f5;border:1px solid #ddd;color:#888';
      html += '<span style="padding:2px 6px;border-radius:3px;font-size:10px;' + style + '">' + (i === constraintPosA ? '?' : constraintPatternA[i]) + '</span>';
    }
    html += '</div>';
    html += '<div style="font-size:12px;text-align:center;color:#4a4a8a;font-weight:bold;margin:2px 0">' + constraintOp + '</div>';

    if (requireChain.length === 0) {
      html += '<div id="requireChainDisplay" class="chain-display" style="justify-content:center"><span class="plus" onclick="addToRequireChain(event)">+</span></div>';
    } else {
      let reqHtml = '<span class="plus" onclick="addToRequireChain(event)">+</span>';
      for (const uri of requireChain) {
        const n = allNodes.find(x => x.uri === uri);
        const val = n ? n.resolved : '?';
        reqHtml += '<span class="sep">,</span>';
        reqHtml += '<span class="item atom" style="' + (val === '?' ? 'background:#d0e0ff;border-color:#58f;font-weight:bold' : '') + '">' + val + '</span>';
      }
      reqHtml += '<span class="sep">,</span>';
      reqHtml += '<span class="plus" onclick="addToRequireChain(event)">+</span>';
      html += '<div id="requireChainDisplay" class="chain-display" style="justify-content:center">' + reqHtml + '</div>';
    }

    html += '<div style="text-align:center;margin-top:4px">';
    if (requireChain.length > 0) {
      html += '<button onclick="saveConstraint()" style="background:#238636;color:#fff;border:none;padding:2px 10px;font-size:9px;border-radius:3px;cursor:pointer;margin-right:4px">save</button>';
    }
    html += '<button onclick="cancelConstraint()" style="background:#8a4a4a;color:#fff;border:none;padding:2px 8px;font-size:9px;border-radius:3px;cursor:pointer">cancel</button>';
    html += '</div>';
  }

  area.innerHTML = html;
}

function renderRequireChain() {
  renderConstraintArea();
}

function addToRequireChain(event) {
  // Use the event target element for positioning
  showAddPopup('require-right', event.target);
}

async function saveConstraint() {
  if (requireChain.length === 0 || constraintPosA < 0 || !constraintOp) return;

  const patternB = requireChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    return n ? n.resolved : '?';
  });

  const positionB = patternB.indexOf('?');
  if (positionB < 0) {
    alert('The second pattern must contain ? at the variable position');
    return;
  }

  await fetch('/api/constraints', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      patternA: constraintPatternA,
      positionA: constraintPosA,
      patternB: patternB,
      positionB: positionB,
      op: constraintOp,
    }),
  });

  if (requireChain.length >= 2) {
    await fetch('/api/ingest-uris', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uris: requireChain}) });
    resolveCache = {};
    await refreshAll();
  }

  cancelConstraint();
  await refreshConstraints();
}

async function deleteConstraint(id) {
  await fetch('/api/constraints/' + id, { method: 'DELETE' });
  await refreshConstraints();
}

async function refreshConstraints() {
  const resp = await fetch('/api/constraints');
  const data = await resp.json();
  const list = document.getElementById('shapeList');
  if (data.constraints.length === 0) {
    list.innerHTML = '<span style="color:#999">None</span>';
    return;
  }
  const opNames = { 'subset': '\u2286 restricts to', 'intersect': '\u2229 intersects', 'union': '\u222a unions', 'exclude': '\u2216 excludes', 'equal': '= equals' };
  list.innerHTML = data.constraints.map(c =>
    '<div style="padding:3px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center">' +
      '<div style="font-size:9px">' +
        'P(' + c.patternA.join(',') + ')[' + c.positionA + ']<br>' +
        '<span style="color:#4a4a8a;font-weight:bold">' + c.op + '</span> ' +
        '<span style="color:#888">' + (opNames[c.op] || c.op) + '</span><br>' +
        'P(' + c.patternB.join(',') + ')[' + c.positionB + ']' +
      '</div>' +
      '<span onclick="deleteConstraint(\'' + c.id + '\')" style="cursor:pointer;color:#c00;font-size:14px;padding-left:8px" title="Delete">\u00d7</span>' +
    '</div>'
  ).join('');
}

// Initial load
refreshConstraints();
refreshAll().then(() => loadFromUrl());
</script>
