<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGSL Browser — Poly-Granular Sequence Lattice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0f; color: #e0e0e0; }

  .header { padding: 16px 24px; background: #111118; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; color: #7ecfff; font-weight: 600; }
  .header .stats { font-size: 12px; color: #666; }

  .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 52px); }

  /* Sidebar */
  .sidebar { background: #0d0d14; border-right: 1px solid #1a1a2e; overflow-y: auto; padding: 12px; }
  .sidebar h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .ingest-form { margin-bottom: 16px; }
  .ingest-form textarea { width: 100%; height: 60px; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 8px; font-family: inherit; font-size: 12px; border-radius: 4px; resize: vertical; }
  .ingest-form select { background: #111; border: 1px solid #333; color: #e0e0e0; padding: 4px 8px; font-size: 11px; border-radius: 4px; margin-right: 4px; }
  .ingest-form button { background: #2a5; color: #fff; border: none; padding: 4px 12px; font-size: 11px; border-radius: 4px; cursor: pointer; }
  .ingest-form button:hover { background: #3b6; }
  .ingest-row { display: flex; gap: 4px; margin-top: 6px; }

  .atom-list { list-style: none; }
  .atom-list li { padding: 4px 8px; font-size: 12px; cursor: pointer; border-radius: 3px; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .atom-list li:hover { background: #1a1a2e; }
  .atom-list li.active { background: #1a2a4e; color: #7ecfff; }
  .atom-list .level-badge { font-size: 10px; color: #555; }

  /* Main area */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* Focus chain */
  .focus-area { padding: 24px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .focus-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  .chain { display: flex; align-items: center; gap: 0; flex-wrap: wrap; justify-content: center; }
  .chain-segment { display: flex; flex-direction: column; align-items: center; }
  .chain-node { padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; position: relative; }
  .chain-node.focus { background: #1a3a6e; color: #7ecfff; border: 2px solid #4a8aee; }
  .chain-node.left { background: #1a2a1a; color: #7eee7e; border: 1px solid #3a5a3a; }
  .chain-node.right { background: #2a1a2a; color: #ee7eee; border: 1px solid #5a3a5a; }
  .chain-node:hover { transform: scale(1.05); filter: brightness(1.2); }
  .chain-node.multi { border-style: dashed; }
  .chain-node.chain-item { background: #1a2a3e; color: #aac; border: 1px solid #2a3a5e; }

  .chain-arrow { font-size: 18px; color: #333; padding: 0 6px; }

  .collapse-btn { padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 16px; border: 1px solid #333; background: #1a1a1a; color: #888; transition: all 0.15s; }
  .collapse-btn:hover { background: #2a2a2a; color: #fff; border-color: #555; }
  .collapse-btn.left { border-color: #3a5a3a; color: #7eee7e; }
  .collapse-btn.right { border-color: #5a3a5a; color: #ee7eee; }

  /* Options (left/right neighbors) */
  .options-panel { display: flex; gap: 2px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
  .option-chip { font-size: 10px; padding: 2px 6px; border-radius: 10px; cursor: pointer; background: #1a1a2e; color: #888; border: 1px solid #2a2a4e; }
  .option-chip:hover { background: #2a2a4e; color: #bbb; }
  .option-chip.left { border-color: #2a4a2a; }
  .option-chip.right { border-color: #4a2a4a; }

  /* Containing fragments */
  .fragments-area { padding: 12px 24px; border-top: 1px solid #1a1a2e; max-height: 200px; overflow-y: auto; }
  .fragments-area h3 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .fragment-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 11px; cursor: pointer; }
  .fragment-row:hover { color: #7ecfff; }
  .fragment-row .flevel { color: #555; min-width: 24px; }
  .fragment-row .ftext { color: #aaa; }
  .fragment-row .ftext .fhighlight { color: #7ecfff; font-weight: 600; }

  .annotations-area { padding: 12px 24px; border-top: 1px solid #1a1a2e; max-height: 180px; overflow-y: auto; }
  .annotations-area h3 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .annotation-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 11px; }
  .annotation-row .arole { padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 600; }
  .annotation-row .arole.head { background: #1a3a1a; color: #7eee7e; }
  .annotation-row .arole.tail { background: #3a1a3a; color: #ee7eee; }
  .annotation-row .arole.medial { background: #1a1a3a; color: #7e7eee; }
  .annotation-row .arole.sole { background: #3a3a1a; color: #eeee7e; }
  .annotation-row .arole.left { background: #1a3a2a; color: #7eeeaa; }
  .annotation-row .arole.right { background: #3a1a2a; color: #ee7eaa; }
  .annotation-row .adepth { color: #555; min-width: 60px; }
  .annotation-row .aparent { color: #888; }

  /* Level distribution bar */
  .level-bar { display: flex; height: 4px; margin: 8px 0; border-radius: 2px; overflow: hidden; }
  .level-bar .seg { height: 100%; }

  .empty-state { color: #444; font-size: 13px; text-align: center; padding: 40px; }
</style>
</head>
<body>

<div class="header">
  <h1>PGSL Browser</h1>
  <div class="stats" id="stats">Loading...</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="ingest-form">
      <h2>Ingest</h2>
      <textarea id="ingestInput" placeholder="Type content to ingest...&#10;e.g. &quot;mark is human&quot;&#10;or &quot;((0,0),(0,0))&quot;"></textarea>
      <div class="ingest-row">
        <select id="granularity">
          <option value="word">word</option>
          <option value="character">char</option>
          <option value="sentence">sentence</option>
          <option value="structured">structured</option>
        </select>
        <button onclick="doIngest()">Ingest</button>
      </div>
    </div>

    <h2>Atoms & Fragments</h2>
    <div class="level-bar" id="levelBar"></div>
    <ul class="atom-list" id="nodeList"></ul>
  </div>

  <div class="main">
    <div class="focus-area" id="focusArea">
      <div class="empty-state">Ingest some content, then click a node to browse the lattice</div>
    </div>
    <div class="annotations-area" id="annotationsArea" style="display:none">
      <h3>Contextual Roles (Peircean Interpretants)</h3>
      <div id="annotationsList"></div>
    </div>
    <div class="fragments-area" id="fragmentsArea" style="display:none">
      <h3>Containing Fragments</h3>
      <div id="fragmentsList"></div>
    </div>
  </div>
</div>

<script>
let allNodes = [];
let focusChain = []; // array of URIs in the current chain
let focusData = null;

async function doIngest() {
  const content = document.getElementById('ingestInput').value.trim();
  if (!content) return;
  const granularity = document.getElementById('granularity').value;
  const resp = await fetch('/api/ingest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content, granularity }),
  });
  const data = await resp.json();
  document.getElementById('ingestInput').value = '';
  await refreshAll();
  // Auto-focus the top fragment
  if (data.uri) setFocus(data.uri);
}

async function refreshAll() {
  const resp = await fetch('/api/all');
  const data = await resp.json();
  allNodes = data.nodes;
  renderStats(data.stats);
  renderNodeList(data.nodes);
  renderLevelBar(data.stats);
}

function renderStats(stats) {
  document.getElementById('stats').textContent =
    `${stats.totalNodes} nodes | ${stats.atoms} atoms | ${stats.fragments} fragments | L0-L${stats.maxLevel}`;
}

function renderLevelBar(stats) {
  const bar = document.getElementById('levelBar');
  bar.innerHTML = '';
  const total = stats.totalNodes || 1;
  const colors = ['#4a8aee', '#3a7ade', '#2a6ace', '#1a5abe', '#0a4aae', '#003a9e',
                  '#002a8e', '#001a7e', '#000a6e', '#00005e', '#000050', '#000040'];
  for (const [level, count] of Object.entries(stats.levels)) {
    const seg = document.createElement('div');
    seg.className = 'seg';
    seg.style.width = (count / total * 100) + '%';
    seg.style.background = colors[Math.min(parseInt(level), colors.length - 1)];
    seg.title = `L${level}: ${count}`;
    bar.appendChild(seg);
  }
}

function renderNodeList(nodes) {
  const list = document.getElementById('nodeList');
  // Sort: atoms first, then by level
  nodes.sort((a, b) => a.level - b.level || a.resolved.localeCompare(b.resolved));
  list.innerHTML = nodes.map(n => {
    const active = focusChain.includes(n.uri) ? ' active' : '';
    const display = n.resolved.length > 30 ? n.resolved.slice(0, 28) + '...' : n.resolved;
    return `<li class="${active}" onclick="setFocus('${encodeURIComponent(n.uri)}')" title="${n.resolved}">
      <span>"${display}"</span>
      <span class="level-badge">L${n.level}</span>
    </li>`;
  }).join('');
}

async function setFocus(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  const node = allNodes.find(n => n.uri === uri);

  if (node && node.level > 0 && node.kind === 'Fragment') {
    // Fragment: decompose into leaf atoms for the chain
    const resp = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri}) });
    if (resp.ok) {
      const data = await resp.json();
      if (data.node && data.node.items && data.node.items.length > 1) {
        // Resolve each item to get its leaf atoms
        const items = data.node.items;
        // For L1 wrappers, unwrap to the atom
        const chainUris = [];
        for (const itemUri of items) {
          const itemNode = allNodes.find(n => n.uri === itemUri);
          if (itemNode && itemNode.kind === 'Fragment' && itemNode.level === 1) {
            // L1 wrapper — find the atom inside
            const atomResp = await fetch('/api/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: itemUri}) });
            if (atomResp.ok) {
              const atomData = await atomResp.json();
              if (atomData.node && atomData.node.items && atomData.node.items.length === 1) {
                chainUris.push(atomData.node.items[0]);
                continue;
              }
            }
          }
          chainUris.push(itemUri);
        }
        focusChain = chainUris;
      } else {
        focusChain = [uri];
      }
    } else {
      focusChain = [uri];
    }
  } else {
    // Atom or unknown: single focus
    focusChain = [uri];
  }

  const focusResp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: focusChain[0]})});
  focusData = await focusResp.json();
  renderFocus();
  renderAnnotations();
  renderFragments();
  renderNodeList(allNodes);
}

async function expandLeft(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  focusChain.unshift(uri);
  // Re-fetch focus for the NEW leftmost to get its left neighbors
  const resp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri})});
  const newFocus = await resp.json();
  focusData._leftExpansion = newFocus;
  renderFocus();
  renderNodeList(allNodes);
}

async function expandRight(encodedUri) {
  const uri = decodeURIComponent(encodedUri);
  focusChain.push(uri);
  const resp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri})});
  const newFocus = await resp.json();
  focusData._rightExpansion = newFocus;
  renderFocus();
  renderNodeList(allNodes);
}

function collapseLeft() {
  if (focusChain.length > 1) {
    focusChain.shift();
    renderFocus();
    renderNodeList(allNodes);
  }
}

function collapseRight() {
  if (focusChain.length > 1) {
    focusChain.pop();
    renderFocus();
    renderNodeList(allNodes);
  }
}

async function renderFocus() {
  const area = document.getElementById('focusArea');
  if (!focusData || focusChain.length === 0) {
    area.innerHTML = '<div class="empty-state">Click a node to browse the lattice</div>';
    return;
  }

  // Get left neighbors for leftmost node in chain
  const leftResp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: focusChain[0]})});
  const leftData = await leftResp.json();

  // Get right neighbors for rightmost node in chain
  const rightResp = await fetch('/api/focus', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({uri: focusChain[focusChain.length - 1]})});
  const rightData = await rightResp.json();

  // Filter out nodes already in the chain from neighbor options
  const chainSet = new Set(focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    return n ? n.resolved : '';
  }));
  const leftOptions = leftData.left.filter(n => !chainSet.has(n.resolved));
  const rightOptions = rightData.right.filter(n => !chainSet.has(n.resolved));

  let html = '<div class="focus-label">Focus Chain (' + focusChain.length + ' nodes)</div>';
  html += '<div class="chain">';

  // LEFT: collapse button + source options
  if (focusChain.length > 1) {
    html += `<button class="collapse-btn left" onclick="collapseLeft()" title="Remove leftmost from chain">&times;</button>`;
  }
  if (leftOptions.length > 0) {
    html += '<div class="chain-segment">';
    html += '<div class="options-panel">';
    html += leftOptions.map(n =>
      `<span class="option-chip left" onclick="expandLeft('${encodeURIComponent(n.uri)}')" title="Add to left of chain">${n.resolved} <small>(${n.count})</small></span>`
    ).join('');
    html += '</div></div>';
    html += '<span class="chain-arrow">&larr;</span>';
  }

  // CHAIN NODES — each clickable to refocus
  for (let i = 0; i < focusChain.length; i++) {
    const uri = focusChain[i];
    const node = allNodes.find(n => n.uri === uri);
    const resolved = node ? node.resolved : '?';

    html += '<div class="chain-segment">';
    html += `<div class="chain-node chain-item" onclick="setFocus('${encodeURIComponent(uri)}')" title="Click to refocus on '${resolved}'">${resolved}</div>`;
    html += '</div>';

    if (i < focusChain.length - 1) {
      html += '<span class="chain-arrow">&mdash;</span>';
    }
  }

  // RIGHT: target options + collapse button
  if (rightOptions.length > 0) {
    html += '<span class="chain-arrow">&rarr;</span>';
    html += '<div class="chain-segment">';
    html += '<div class="options-panel">';
    html += rightOptions.map(n =>
      `<span class="option-chip right" onclick="expandRight('${encodeURIComponent(n.uri)}')" title="Add to right of chain">${n.resolved} <small>(${n.count})</small></span>`
    ).join('');
    html += '</div></div>';
  }
  if (focusChain.length > 1) {
    html += `<button class="collapse-btn right" onclick="collapseRight()" title="Remove rightmost from chain">&times;</button>`;
  }

  html += '</div>';

  // Chain info
  const chainResolved = focusChain.map(u => {
    const n = allNodes.find(x => x.uri === u);
    return n ? n.resolved : '?';
  }).join(' ');
  html += `<div style="margin-top:12px;font-size:12px;color:#666">"${chainResolved}"</div>`;

  area.innerHTML = html;
}

function renderAnnotations() {
  const area = document.getElementById('annotationsArea');
  if (!focusData || !focusData.annotations || !focusData.annotations.length) {
    area.style.display = 'none';
    return;
  }
  area.style.display = '';
  const list = document.getElementById('annotationsList');
  list.innerHTML = focusData.annotations.map(a => {
    const depthLabel = `${a.depthFromTop} from top, ${a.depthFromBottom} from bottom`;
    const spanPct = (a.span * 100).toFixed(0) + '%';
    return `<div class="annotation-row" onclick="setFocus('${encodeURIComponent(a.parentUri)}')">
      <span class="arole ${a.role}">${a.role}</span>
      <span class="adepth">pos ${a.position} | ${depthLabel}</span>
      <span class="aparent">"${a.parentResolved.length > 40 ? a.parentResolved.slice(0,38) + '...' : a.parentResolved}" (L${a.totalDepth}, ${spanPct})</span>
    </div>`;
  }).join('');
}

function renderFragments() {
  const area = document.getElementById('fragmentsArea');
  if (!focusData || !focusData.containingFragments.length) {
    area.style.display = 'none';
    return;
  }
  area.style.display = '';
  const list = document.getElementById('fragmentsList');
  list.innerHTML = focusData.containingFragments.map(f => {
    const parts = f.itemsResolved.map((r, i) => {
      const isMatch = f.items[i] === focusChain[0];
      return isMatch ? `<span class="fhighlight">${r}</span>` : r;
    });
    return `<div class="fragment-row" onclick="setFocus('${encodeURIComponent(f.uri)}')">
      <span class="flevel">L${f.level}</span>
      <span class="ftext">${parts.join(' ')}</span>
    </div>`;
  }).join('');
}

// Initial load
refreshAll();
</script>
</body>
</html>
