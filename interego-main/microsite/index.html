<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interego — composable, verifiable, federated context infrastructure for multi-agent shared memory. A protocol (Context Graphs 1.0) and a substrate, with verticals that compose on top." />
    <title>Interego — composable, verifiable, federated context infrastructure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <style>
      :root {
        --bg: #ddd4be;
        --panel: #f5efe2;
        --panel-2: #ece5d4;
        --border: #c5bca5;
        --text: #1a2332;
        --text-dim: #5c6573;
        --accent: #c1501c;
        --accent-2: #8b3a14;
        --good: #2f6a3a;
        --warn: #b87211;
        --bad: #a8331f;
        --shadow: 0 1px 0 rgba(26,35,50,0.08), 0 6px 18px rgba(26,35,50,0.08);
        --shadow-lg: 0 4px 16px rgba(26,35,50,0.10), 0 24px 64px rgba(26,35,50,0.10);
      }
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; }
      body {
        font-family: 'EB Garamond', Garamond, Georgia, serif;
        background: var(--bg);
        color: var(--text);
        font-size: 17px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; cursor: pointer; }
      input, select, textarea { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
      pre, code, .mono { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; }
      .label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
      }
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: var(--panel-2); }
      ::-webkit-scrollbar-thumb { background: var(--border); border: 2px solid var(--panel-2); border-radius: 5px; }
      .blink { animation: foxxi-blink 1.4s infinite both; }
      .blink:nth-child(2) { animation-delay: 0.2s; }
      .blink:nth-child(3) { animation-delay: 0.4s; }
      @keyframes foxxi-blink {
        0%, 80%, 100% { opacity: 0.25; }
        40% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
